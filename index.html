<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WELL AP 300題闖關測驗</title>
<style>
:root{--accent:#ffb703;--good:#22c55e;--bad:#ef4444;--ink:#1f2937;--muted:#6b7280;}
*{box-sizing:border-box;}
body{margin:0;min-height:100vh;font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
  background:linear-gradient(135deg,#1e3c72,#2a5298 45%,#43cea2);background-attachment:fixed;color:var(--ink);}
#app{max-width:920px;margin:0 auto;padding:16px 16px 70px;}
.topbar{display:flex;align-items:center;justify-content:space-between;color:#fff;padding:10px 4px;flex-wrap:wrap;gap:8px;}
.topbar .who{font-weight:800;font-size:16px;}
.pill{background:rgba(255,255,255,.2);border-radius:999px;padding:6px 14px;font-size:13px;backdrop-filter:blur(4px);white-space:nowrap;}
.btn{cursor:pointer;border:none;border-radius:12px;padding:10px 18px;font-size:15px;font-weight:700;transition:transform .1s;}
.btn:active{transform:scale(.96);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--accent);color:#3b2400;}
.btn-ghost{background:rgba(255,255,255,.22);color:#fff;}
.btn-outline{background:#fff;color:#1f2937;border:2px solid #e5e7eb;}
.card{background:#fff;border-radius:20px;padding:26px;box-shadow:0 10px 30px rgba(0,0,0,.25);}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:72vh;text-align:center;}
input.nick{padding:12px 16px;border-radius:12px;border:2px solid #e5e7eb;font-size:16px;width:220px;text-align:center;}
.quick-nick{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:14px;}
.quick-nick button{background:#fff;border:2px solid #e5e7eb;border-radius:999px;padding:6px 14px;cursor:pointer;font-size:14px;}
.section{margin:22px 0;}
.section-head{display:flex;align-items:center;gap:10px;color:#fff;margin-bottom:10px;}
.section-head .dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex:none;}
.levels-row{display:flex;gap:14px;flex-wrap:wrap;}
.level-node{width:86px;height:86px;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-weight:800;color:#fff;box-shadow:0 6px 14px rgba(0,0,0,.25);text-align:center;}
.level-node.locked{background:#94a3b8!important;cursor:not-allowed;opacity:.75;}
.level-node .stars{font-size:11px;margin-top:2px;letter-spacing:1px;}
.level-node .lv{font-size:20px;line-height:1;}
.level-node .num{font-size:12px;margin-top:2px;}
.qcard{background:#fff;border-radius:20px;padding:22px;}
.qprog{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.qprog span{width:22px;height:8px;border-radius:4px;background:#e5e7eb;display:inline-block;}
.qprog span.done{background:var(--accent);}
.qprog span.now{background:#1f2937;}
.qtext{font-size:17px;line-height:1.8;margin-bottom:18px;font-weight:700;white-space:pre-wrap;}
.opt{display:block;width:100%;text-align:left;padding:14px 16px;border-radius:14px;border:2px solid #e5e7eb;background:#fafafa;margin-bottom:10px;cursor:pointer;font-size:15px;line-height:1.6;}
.opt.sel{border-color:#1f2937;background:#eef2ff;}
.opt.correct-opt{border-color:var(--good);background:#ecfdf3;color:#15803d;font-weight:700;cursor:default;}
.opt.wrong-opt{border-color:var(--bad);background:#fef2f2;color:#b91c1c;font-weight:700;cursor:default;}
.opt.disabled-opt{opacity:.55;cursor:default;}
.fb-banner{padding:12px 14px;border-radius:12px;margin:4px 0 14px;font-weight:800;font-size:15px;}
.fb-banner.ok{background:#ecfdf3;color:#15803d;}
.fb-banner.no{background:#fef2f2;color:#b91c1c;}
.opt.correct-opt{border-color:var(--good);background:#ecfdf3;color:#15803d;font-weight:700;cursor:default;}
.opt.wrong-opt{border-color:var(--bad);background:#fef2f2;color:#b91c1c;font-weight:700;cursor:default;}
.opt.disabled-opt{opacity:.55;cursor:default;}
.fb-banner{padding:12px 14px;border-radius:12px;margin:4px 0 14px;font-weight:800;font-size:15px;}
.fb-banner.ok{background:#ecfdf3;color:#15803d;}
.fb-banner.no{background:#fef2f2;color:#b91c1c;}
.review{border-left:5px solid #e5e7eb;padding:10px 14px;margin-bottom:12px;border-radius:8px;background:#f9fafb;}
.review.ok{border-color:var(--good);}
.review.no{border-color:var(--bad);}
.review .tag{font-size:12px;font-weight:800;padding:2px 10px;border-radius:999px;color:#fff;display:inline-block;margin-bottom:6px;}
.review.ok .tag{background:var(--good);}
.review.no .tag{background:var(--bad);}
.explain{color:var(--muted);font-size:14px;margin-top:6px;line-height:1.6;}
.badges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:12px;margin-top:14px;}
.badge{background:#f9fafb;border-radius:16px;padding:14px 8px;text-align:center;border:2px solid #e5e7eb;}
.badge.locked{opacity:.35;}
.badge .ic{font-size:30px;}
.badge .nm{font-size:12px;font-weight:800;margin-top:6px;}
.badge .ds{font-size:10px;color:var(--muted);margin-top:2px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;}
.modal{background:#fff;border-radius:20px;padding:24px;max-width:560px;width:100%;max-height:82vh;overflow:auto;}
.toast{position:fixed;left:50%;top:20px;transform:translateX(-50%);background:#111827;color:#fff;padding:12px 22px;border-radius:999px;font-weight:700;z-index:99;animation:fadeInOut 2.4s ease forwards;}
@keyframes fadeInOut{0%{opacity:0;transform:translate(-50%,-10px);}10%{opacity:1;transform:translate(-50%,0);}85%{opacity:1;}100%{opacity:0;transform:translate(-50%,-10px);}}
.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:60;}
.confetti i{position:absolute;top:-10px;width:8px;height:14px;opacity:.9;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);}}
.bigstars{font-size:40px;letter-spacing:8px;margin:10px 0;}
.scoretxt{font-size:40px;font-weight:900;}
.muted{color:var(--muted);}
.footer-actions{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap;}
h2,h3{margin:8px 0;}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ===================== 資料：10大健康概念 ===================== */
const CONCEPTS = [
 {name:"空氣 Air", color:"#42A5F5", icon:"🌬️"},
 {name:"水 Water", color:"#26C6DA", icon:"💧"},
 {name:"溫熱舒適 Thermal Comfort", color:"#FFA726", icon:"🌡️"},
 {name:"聲音 Sound", color:"#AB47BC", icon:"🔊"},
 {name:"營養 Nourishment", color:"#66BB6A", icon:"🥗"},
 {name:"運動 Movement", color:"#FF7043", icon:"🏃"},
 {name:"身心健康 Mind", color:"#EC407A", icon:"🧠"},
 {name:"建材 Materials", color:"#8D6E63", icon:"🧱"},
 {name:"社區 Community", color:"#5C6BC0", icon:"🤝"},
 {name:"光環境 Light", color:"#FFCA28", icon:"💡"}
];

/* c=概念索引(0-9, 依CONCEPTS順序, 每概念需按順序放30題)
   q=題目 o=[選項A,B,C,D] a=正解索引(0=A,1=B,2=C,3=D) e=解析 */
const QUESTIONS = [
/* ---- 01 空氣 Air ---- */
{c:0,q:"在WELL AP V2認證中，於低污染地區，除商業廚房及工業空間外，依據Feature A01：空氣品質（Air Quality）Part 1: 達到懸浮微粒門檻值的規定，可接受的懸浮微粒門檻值為何？",o:["PM2.5 ≤ 50 μg/m³ 且 PM10 ≤ 15 μg/m³","PM2.5 ≤ 10 μg/m³ 且 PM10 ≤ 2.5 μg/m³","PM2.5 ≤ 15 μg/m³ 且 PM10 ≤ 50 μg/m³","PM2.5 ≤ 25 μg/m³ 且 PM10 ≤ 75 μg/m³"],a:2,e:"Feature A01空氣品質中，Part 1針對懸浮微粒門檻值依專案所在地污染程度及空間類型設有不同情境；一般空間於低污染地區的門檻為PM2.5 ≤ 15 μg/m³、PM10 ≤ 50 μg/m³。"},
{c:0,q:"依據Feature A01：空氣品質，商業廚房空間中懸浮微粒的可接受門檻值為何？",o:["PM2.5 ≤ 15 μg/m³","PM2.5 ≤ 35 μg/m³","PM2.5 ≤ 25 μg/m³","PM10 ≤ 35 μg/m³"],a:1,e:"商業廚房因烹調產生較多微粒，其PM2.5門檻放寬至35 μg/m³或以下。"},
{c:0,q:"若專案內有位於地面層或以下且經常有人使用的空間，依Feature A01：空氣品質Part 4「達到氡氣門檻值」規定，應在何處進行氡氣檢測？",o:["最低樓層之使用空間","最高樓層之使用空間","最低樓層之無人使用空間","地面層或以下樓層"],a:3,e:"氡氣檢測要求鎖定「地面層或以下」且經常有人使用的空間進行採樣，以掌握氡氣滲入風險最高的區域。"},
{c:0,q:"某既有辦公園區已於所有建築入口張貼禁菸標示，範圍涵蓋入口、可開啟窗戶、進氣口及戶外常用空間外7.5公尺（25英尺）內禁止吸菸。若中庭區域超出上述7.5公尺範圍，依Feature A02：無菸環境Part 2「禁止戶外吸菸」規定，應額外設置何種標示？",o:["當地戶外公共空間吸菸法規，每15公尺（50英尺）沿禁菸區邊界張貼一次","戒菸計畫聯絡資訊，每15公尺（50英尺）沿禁菸區邊界張貼一次","指定吸菸區位置，每30公尺（100英尺）沿步道張貼一次","吸菸危害資訊，於地面層每30公尺（100英尺）沿步道張貼一次"],a:3,e:"超出必要禁菸範圍之戶外集會區域，須以每30公尺於步道地面層張貼吸菸危害資訊標示，持續傳達健康風險。"},
{c:0,q:"一棟辦公大樓的空氣品質檢測已符合Feature A01：空氣品質Part 3「無機氣體」中臭氧的最低標準。該Part 3還要求達到下列哪一項最低標準？",o:["一氧化碳 ≤ 10 μg/m³","PM2.5 ≤ 15 μg/m³","甲醛 ≤ 50 μg/m³","PM10 ≤ 35 μg/m³"],a:0,e:"Part 3無機氣體同時規範臭氧與一氧化碳，其中一氧化碳門檻為10 μg/m³或以下。"},
{c:0,q:"西雅圖一棟新建辦公大樓正由WELL效能測試人員進行後使用階段的效能檢測。依Feature A01：空氣品質Part 2「達到有機氣體門檻值」規定，甲醛的最低門檻為何？",o:["≤10 μg/m³","≤50 μg/m³","≤150 μg/m³","≤300 μg/m³"],a:1,e:"Part 2有機氣體門檻要求甲醛濃度須達50 μg/m³或以下。"},
{c:0,q:"下列「空氣」概念中的哪一項特徵是WELL認證的先決條件（Precondition）？",o:["Feature A02：無菸環境","Feature A05：加強空氣品質","Feature A06：加強通風設計","Feature A10：燃燒最小化"],a:0,e:"Feature A02無菸環境為空氣概念的先決條件之一，所有WELL專案皆須符合。"},
{c:0,q:"依Feature A05：加強空氣品質Part 3「達到無機氣體門檻值」規定，所有空間一氧化碳的最高容許濃度為何？",o:["≤140 μg/m³","≤7 mg/m³","≤40 μg/m³","≤25 mg/m³"],a:1,e:"加強版門檻較基本版更嚴格，一氧化碳須控制在7 mg/m³或以下。"},
{c:0,q:"於機械通風空間中，通風系統應依下列哪一組指南設計供氣與排氣速率，以符合Feature A03：通風設計Part 1「確保充足通風」的規定？",o:["ASHRAE 62.1-2010、ASHRAE 62.2-2016","CIBSE AM10、ASHRAE 62.2-2016","AS 1668.4-2012、CIBSE AM10","ASHRAE 55、AS 1668.4-2012"],a:0,e:"機械通風空間須依ASHRAE 62.1-2010及ASHRAE 62.2-2016等相關標準設計供排氣速率。"},
{c:0,q:"於完全無機械通風的自然通風空間中，至少90%的專案空間須符合下列何項規定？",o:["ASHRAE 63","CIBSE AM10","AS 1669.2-2012","ASHRAE 55"],a:1,e:"Feature A03通風設計要求自然通風空間至少90%須符合CIBSE AM10自然通風指南。"},
{c:0,q:"使用紫外線殺菌照射（UVGI）是下列哪一項特徵的必要規定？",o:["Feature A14：微生物與黴菌控制","Feature A06：加強通風設計","Feature A01：空氣品質","Feature A12：空氣過濾"],a:0,e:"Feature A14微生物與黴菌控制要求採用UVGI等紫外線處理技術以抑制微生物孳生。"},
{c:0,q:"下列何者「不屬於」Feature A04：施工污染管理的內容？",o:["風管保護","濾網更換","外殼試運轉（Envelope Commissioning）","濕度與粉塵管理"],a:2,e:"外殼試運轉屬於Feature A09污染滲入管理的內容，並非A04施工污染管理的項目。"},
{c:0,q:"依規定，入口除塵系統（entryway walk-off systems）的最小尺寸為何？",o:["至少與門口同寬，且沿行進方向長2公尺（6英尺）","至少寬2公尺（6英尺），沿行進方向長3公尺（10英尺）","至少與門口同寬，且沿行進方向長3公尺（10英尺）","至少寬2公尺（6英尺），沿行進方向長4公尺（12英尺）"],a:2,e:"Feature A09污染滲入管理Part 1「設計健康入口」要求除塵墊等系統至少與門口同寬，且長度達3公尺（10英尺）。"},
{c:0,q:"某辦公空間位於市中心大樓5樓，依Feature A03：通風設計規定，對HVAC系統進行測試與平衡的最佳時機為何？",o:["使用前","專案啟用後","試運轉後","實質完工前"],a:1,e:"測試與平衡應於專案啟用之後進行，以反映實際使用情況下的系統表現。"},
{c:0,q:"依Feature A05：加強空氣品質Part 2「達到加強版有機氣體門檻值」規定，須符合下列哪一組門檻？",o:["甲醛 ≤9 μg/m³ 且 甲苯 ≤300 μg/m³","甲醛 ≤9 μg/m³ 且 PM2.5 ≤12 μg/m³","PM2.5 ≤12 μg/m³ 且 甲苯 ≤300 μg/m³","甲醛 ≤9 μg/m³ 且 PM10 ≤20 μg/m³"],a:0,e:"加強版有機氣體門檻同時規範甲醛（≤9 μg/m³）與甲苯（≤300 μg/m³）。"},
{c:0,q:"由於難以逐一檢測室內空氣中所有可能污染物，下列何種易於偵測的污染物常被作為其他室內污染物的替代指標？",o:["一氧化碳","PM2.5","濕度","二氧化碳"],a:3,e:"Feature A06加強通風設計概述指出，二氧化碳濃度常作為評估整體室內污染物累積程度的替代指標。"},
{c:0,q:"東京一處新建複合開發案週邊環境的懸浮微粒濃度偏高。依Feature A12：空氣過濾規定，專案團隊應安裝下列何者以保護使用者免受微粒暴露？",o:["依該地區年平均PM2.5濃度選用合適的介質濾網","MERV 10或M5等級濾網","活性碳濾網","MERV 16或E10等級濾網"],a:0,e:"濾網等級應依專案所在地年平均PM2.5濃度分級選用，而非一律採用固定等級。"},
{c:0,q:"聖地牙哥一棟新建辦公大樓年平均PM2.5為21 μg/m³。依Feature A12：空氣過濾Part 1「實施微粒過濾」規定，應採用下列何種濾網？",o:["MERV 8或G4","MERV 10或M5","MERV 12或M6","MERV 14或F8"],a:2,e:"年平均PM2.5介於一定範圍時，對應要求為MERV 12或M6等級濾網。"},
{c:0,q:"一棟位於郊區園區的新建醫療辦公大樓，樓高2層，共6家租戶，大廳設有24小時保全櫃檯及每日停車服務人員。若該案欲追求WELL認證，下列何者屬於符合規定的建築入口設計？",o:["兩道常閉門（主要建築門及租戶套房門）依序設置","兩道常閉門（主要建築門及個別辦公室門）依序設置","三道常閉門依序設置：主要建築門、一樓電梯門、二樓電梯門","設有前廳，內含兩道常閉門"],a:3,e:"Feature A09污染滲入管理要求以前廳搭配兩道常閉門的設計，有效阻隔外部污染物滲入。"},
{c:0,q:"Feature A09：污染滲入管理旨在減少污染物經由建築外殼與入口進入室內空氣，其中一項策略為設計健康入口。另一項可用以減少建築污染物滲入的策略為何？",o:["空氣沖洗（Air flush）","再試運轉（Retrocommissioning）","室內空氣品質檢測","外殼試運轉（Envelope Commissioning）"],a:3,e:"除健康入口設計外，外殼試運轉是另一項用以減少污染滲入的重要策略。"},
{c:0,q:"為取得Feature A06：加強通風設計Part 1「提高室外空氣供應量」的積分，最小新鮮空氣供應率須超過ASHRAE標準多少比例？",o:["10%或15%","20%或40%","30%或60%","50%或80%"],a:2,e:"依積分等級不同，新鮮空氣供應率須超過ASHRAE基準30%或60%。"},
{c:0,q:"下列哪一項特徵透過置換通風於地板高度送入新鮮室外空氣，以改善室內空氣品質？",o:["Feature A06：加強通風設計","Feature A01：空氣品質","Feature A09：污染滲入管理","Feature A03：通風設計"],a:0,e:"Feature A06加強通風設計提及置換通風策略，於地板高度送風、將污濁空氣留在通風區上方排出。"},
{c:0,q:"確保可能產生空氣污染源的室內房間以自動關閉門與鄰近空間隔離，是下列哪一項WELL特徵的規定？",o:["Feature A01：空氣品質","Feature A11：空氣源隔離","Feature A06：加強通風設計","Feature A13：加強供氣"],a:1,e:"Feature A11空氣源隔離要求以自動關閉門等方式，將污染源房間與其他空間有效區隔。"},
{c:0,q:"約翰尼斯堡一棟辦公大樓的物業經理正安裝大廳看板，即時顯示室內環境品質數據。依Feature A08：空氣品質監測與警覺規定，下列何者「並非」必要顯示參數？",o:["濕度","一氧化碳","二氧化碳","總揮發性有機化合物（TVOC）"],a:0,e:"濕度並非A08要求的必要顯示參數，該特徵著重於CO、CO2及TVOC等空氣品質指標。"},
{c:0,q:"依Feature A08：空氣品質監測與警覺規定，室內空氣監測的持續性要求為何？",o:["每小時記錄一次數據；每月向IWBI提交報告","24小時分析數據並每月透過WELL Online提交","於常態使用時段分析數據，並每年透過WELL Online提交","分析數據並提交予IWBI"],a:2,e:"該特徵要求於常態使用時段內持續監測分析，並每年透過WELL Online平台提交數據。"},
{c:0,q:"依Feature A07：可開啟窗戶規定，在將可開啟窗戶納入建築設計之前，須先符合下列何項條件？",o:["至少75%經常使用空間設有可通往室外空氣的可開啟窗戶","至少25%經常使用空間設有可通往室外空氣的可開啟窗戶","所有經常使用空間的窗戶皆須可開啟","經常使用空間內不得設置任何窗戶"],a:0,e:"採用可開啟窗戶策略前，須先確認至少75%的經常使用空間具備通往室外空氣的可開啟窗。"},
{c:0,q:"在既有建築的主要風管中加裝活性碳濾網，其主要目的為何？",o:["降低室內空氣中的揮發性有機化合物（VOCs）","降低HVAC振動產生的噪音","降低能源需求","提升熱舒適度"],a:0,e:"Feature A13加強供氣概述指出，活性碳濾網主要用以去除室內空氣中的VOCs。"},
{c:0,q:"在採用強制空氣冷卻系統的建築中，依Feature A14：微生物與黴菌控制規定，下列何者為空氣消毒策略？",o:["紫外線殺菌照射與活性碳濾網","紫外線燈（UVGI）","光觸媒氧化與MERV 13濾網","活性碳濾網與光觸媒氧化"],a:1,e:"強制空氣冷卻系統中，UVGI為主要的空氣消毒策略之一。"},
{c:0,q:"在何種情況下，燃燒式空間暖爐可被允許用於經常使用空間？",o:["具備最長15分鐘循環之自動關閉計時器時","燃燒式空間暖爐永遠不得用於經常使用空間","位於外門7.5公尺（25英尺）範圍內時","位於外牆且直接排至室外時"],a:1,e:"依Feature A10燃燒管理規定，燃燒式空間暖爐不得用於任何經常使用空間，無例外情形。"},
{c:0,q:"Feature A01：空氣品質的核心目的為何？",o:["提供對室內空氣污染物的基本認識","為使用者提供濕度控制面板","提供有助於使用者健康與福祉的基本室內空氣品質水準","提供對建築外殼於室內空氣品質所扮演角色的基本認識"],a:2,e:"Feature A01的核心目的在於確保基本室內空氣品質，以支持使用者的健康與福祉。"},
/* ---- 02 水 Water ---- */
{c:1,q:"人體約有三分之二由水組成，且全球多數人口處於水分攝取不足的狀態。依年齡、性別及是否懷孕等因素，成人每日建議飲水量的建議範圍為何？",o:["每日49–125盎司","每週49–125盎司","每日25–72盎司","每日8杯水"],a:0,e:"依水概念概述，成人依個別條件不同，每日建議飲水量落在49–125盎司之間。"},
{c:1,q:"某既有建築專案正申請WELL認證，經檢測所有供水濁度低於1.0 NTU。依Feature W01：水質指標規定，還須通過下列哪一項檢測才能達成此特徵？",o:["pH值須為中性7","每季檢測無機金屬","所有供人接觸的用水皆須安裝活性碳濾器","任何100毫升樣本中皆未檢出總大腸桿菌群"],a:3,e:"Feature W01水質指標要求供人接觸用水須同時符合濁度（≤1.0 NTU）與總大腸桿菌群未檢出兩項標準。"},
{c:1,q:"下列何種建築系統與濁度限值有關？",o:["效能測試（Performance Test）","技術文件（Technical Document）","持續數據報告（On-going Data Report）","業主保證函（Letter of Assurance from Owner）"],a:2,e:"濁度相關數據通常以持續數據報告方式提交驗證。"},
{c:1,q:"佛羅里達州薩拉索塔一項租戶裝修專案關切建築內水質問題，經檢測發現水有鹹味。下列何種化學物質可能導致此現象？",o:["鋁","鐵","氯化物","銅"],a:2,e:"依Feature W04：加強水質規定，氯化物含量偏高會使水產生鹹味。"},
{c:1,q:"依Feature W01：水質指標Part 1「驗證水質指標」規定，供專案使用且供人接觸的水，濁度最高門檻為何？",o:["0.3 NTU","1.0 NTU","0.4 NTU","0.8 NTU"],a:1,e:"供人接觸用水（如飲用、烹飪、洗滌、淋浴等）之濁度須≤1.0 NTU、FTU或FNU。"},
{c:1,q:"依Feature W04：加強水質規定，供人飲用之所有供水須符合下列鐵含量最高限值為何？",o:["≤0.2 mg/L","≤1 mg/L","≤0.3 mg/L","≤0.05 mg/L"],a:2,e:"Feature W04 Part 1規定鐵含量須≤0.3 mg/L。"},
{c:1,q:"許多人水分攝取不足，且常選擇含糖飲料而非水，其主要原因為何？",o:["只願意飲用瓶裝水","不需要喝太多水","不喜歡水的味道","對飲用水安全性的不信任"],a:3,e:"即使自來水通常安全無虞，許多人仍對其安全性抱持不信任，轉而選擇含糖飲料。"},
{c:1,q:"儘管飲用水品質近年已大幅改善，但工業、農業與製藥來源所帶來的風險仍持續升高。依WELL Building Standard，下列哪些污染物可能導致嬰兒氧氣運輸受損及兒童神經發展受損？",o:["鉛與汞","銅與硝酸鹽","硝酸鹽與鉛","鐵與鉛"],a:2,e:"水概念概述指出，硝酸鹽與鉛的污染源可能對嬰幼兒神經發展及氧氣運輸造成不良影響。"},
{c:1,q:"為符合Feature W02：飲用水品質Part 2「達到有機物與農藥門檻值」此先決條件，專案有哪兩種可行選項？",o:["現場檢測","飲用水品質報告","飲用水採樣","飲用水品質報告或現場檢測"],a:3,e:"專案可選擇提供飲用水品質報告，或進行現場檢測，兩者擇一即可符合此先決條件。"},
{c:1,q:"依Feature W05：飲用水品質管理Part 1「評估與維持飲用水品質」規定，應多久檢測一次飲用水以評估並維持其品質？",o:["每年","每週","每季","每月"],a:2,e:"Feature W05 Part 1要求每季進行一次飲用水品質檢測。"},
{c:1,q:"依Feature W05：飲用水品質管理Part 1規定，水質檢測結果應多久透過WELL數位平台提交一次？",o:["每月","每次檢測完成後","每季","每年"],a:3,e:"檢測結果須每年透過WELL數位平台提交。"},
{c:1,q:"退伍軍人症（Legionnaire's disease）尤其影響下列哪一類族群？",o:["免疫功能低下者","吸菸者","50歲以上族群","以上皆是"],a:3,e:"詳見Feature W03：基本水管理概述，退伍軍人症對免疫低下者、吸菸者及年長者影響皆較顯著。"},
{c:1,q:"依Feature W05：飲用水品質管理Part 1規定，所有空間每季須於出水點檢測下列哪些污染物？",o:["鉛、銅、汞、砷","鉛、銅、濁度、大腸桿菌群","銅、濁度、汞、鎳","大腸桿菌群、濁度、汞、鎳"],a:1,e:"每季應於出水點檢測鉛、銅、濁度及大腸桿菌群等項目。"},
{c:1,q:"邁阿密一項專案正致力完成Feature W02：飲用水品質規定。依Part 1「達到化學物質門檻值」，所有飲水機須符合下列何項參數？",o:["游離氯不得超過10 mg/L","游離氯不得超過7 mg/L","游離氯不得超過1 mg/L","游離氯不得超過4 mg/L"],a:3,e:"Part 1化學門檻要求游離氯不得超過4 mg/L。"},
{c:1,q:"依WELL規定，建築規模的介入措施可依需去除的污染物種類改善水質。下列何種系統「無法」有效捕捉水中污染物？",o:["HEPA濾網","離子交換樹脂","逆滲透（RO）","活性碳濾網"],a:0,e:"HEPA濾網主要用於過濾空氣中的懸浮微粒，並非設計用於去除水中污染物。"},
{c:1,q:"鉛、砷、銻、汞、鎳、銅、鎘及鉻皆為下列何者之例？",o:["影響水質之污染物","消毒副產物","微生物","有機污染物"],a:0,e:"上述皆屬於會影響水質的重金屬類污染物。"},
{c:1,q:"為促進適當水分攝取，依Feature W06：飲用水促進規定，所有經常使用樓層空間與飲水機之間的最大距離為何？",o:["每10公尺（32英尺）","每30公尺（100英尺）","每50公尺（165英尺）","每100公尺（330英尺）"],a:1,e:"每層樓至少設置一台飲水機，且所有經常使用樓層空間及用餐區皆須在30公尺（100英尺）步行距離內可及。"},
{c:1,q:"作為Feature W06：飲用水促進飲水機維護的一部分，飲水機的出水口、防護罩及水槽應多久清潔一次？",o:["每週兩次","每天","每隔一天","每週"],a:1,e:"飲水機相關部件須每日清潔，以維持衛生與使用意願。"},
{c:1,q:"一家軟體公司正在舊金山興建10萬平方英尺的新辦公大樓，業主擔心建築內部供水系統可能孳生微生物。依Feature W02：飲用水品質規定，下列哪種過濾系統有助於防止飲用水中孳生微生物？",o:["管線式砂濾器","鹼性水離子化器","具活性碳濾網的逆滲透系統","紫外線過濾系統"],a:2,e:"搭配活性碳濾網的逆滲透系統可有效去除污染物並抑制微生物孳生。"},
{c:1,q:"為符合Feature W08：衛生支持Part 1「提供衛浴與洗手設施」的規定，商辦空間可採取下列哪些衛生支援措施？",o:["設置掛勾或置物架","免費提供生理用品","於女性及單人衛浴設置垃圾桶","以上皆是"],a:3,e:"Feature W08衛生支持涵蓋掛勾／置物架、免費生理用品及垃圾桶等多項基本衛浴設施要求。"},
{c:1,q:"某商辦提供附設托兒設施，並為在職家長提供家庭衛浴間使用。依Feature W08：衛生支持Part 1規定，該衛浴間須包含下列何者？",o:["兒童用洗手台與馬桶，或供兒童使用成人尺寸設施的替代方案","僅供兒童使用的獨立隔間","地毯以降低滑倒風險","兒童可觸及的電燈開關"],a:0,e:"家庭衛浴間須包含尿布台、兒童馬桶（或成人尺寸替代方案）、兒童洗手台（或替代方案）、感應式照明、防滑地板、安全扶手及至少一處置物空間。"},
{c:1,q:"某位於多雨氣候的新建建築正申請WELL認證，該地區常見過度濕氣與潮濕問題。依Feature W07：濕度管理Part 1「設計防潮外殼」規定，下列何者「並非」必須採行之防潮策略？",o:["安裝連續排水面","進行氣密性測試","施工期間管理基地排水與雨水","於所有出入口安裝多孔踏墊以防止帶入水分"],a:3,e:"選項D並非Part 1「設計防潮外殼」列出的防潮策略之一。"},
{c:1,q:"Feature W07：濕度管理規定，為控制建築內部濕度，須制定計畫處理下列何項議題？",o:["更換對濕氣敏感的建材","冷表面（如地下室、地坪、外牆內側及玻璃）之結露現象","建立排水計畫","安裝除濕系統"],a:1,e:"除防潮建材選用外，計畫亦須處理冷表面結露問題，如地下室、地坪、外牆內側與玻璃。"},
{c:1,q:"某WELL專案正實施黴菌與濕氣管理計畫。依Feature W07：濕度管理Part 3「實施黴菌與濕氣管理計畫」規定，下列何者「不會」出現在此計畫中？",o:["每季提交黴菌與漏水檢查報告","建立定期檢查水管漏水的機制","建立占用者與租戶回報黴菌或水損的系統","訂定天花板、牆面、地板及HVAC設備水損、變色與黴菌的檢查排程"],a:0,e:"相關報告僅需每年（而非每季）透過WELL數位平台提交。"},
{c:1,q:"某新辦公園區為降低對市政供水的需求，計畫安裝非飲用水回收再利用系統，但擔心交叉污染問題。在Feature W09β：現地非飲用水再利用規定，下列何者「不需」納入安全計畫？",o:["系統安裝地點所有適用的當地法規清單","系統安裝建築的藍圖","設計、營運、維護及第三方檢驗的關鍵團隊角色清單","顯示非飲用水來源、輸送、儲存單元、處理設備及使用點的流程圖"],a:1,e:"建築藍圖並非安全計畫要求列出的項目之一。"},
{c:1,q:"Feature W09β：現地非飲用水再利用規定，透過安裝非飲用水再利用與收集系統，專案最高可協助降低多少比例的用水量？",o:["50%","85%","75%","35%"],a:2,e:"妥善管理非飲用水再利用與收集系統，可使新建建築用水量最高降低75%。"},
{c:1,q:"為支持Feature W08：衛生支持Part 3「支持有效洗手」的規定，下列何者為必須符合的要求之一？",o:["洗手站位置皆有清楚標示","水龍頭設計使水直接流入排水孔","出水柱與水槽邊緣至少相距3英吋","裝設防濺板"],a:2,e:"出水柱應與水槽邊緣保持至少3英吋距離，以降低水花及細菌散播風險。"},
{c:1,q:"依據WELL Building Standard Feature W07：濕度管理概述，歐洲、加拿大與美國有多少比例的建築受過度濕氣與潮濕問題影響？",o:["10%","20%","30%","40%"],a:1,e:"概述指出，歐洲、加拿大與美國約20%的建築受過度濕氣與潮濕問題所影響。"},
{c:1,q:"水概念在WELL Building Standard中「並未」致力於改善下列何者？",o:["提升建築使用者的適當水分攝取","降低因建築內受污染水與過度濕氣帶來的健康風險","藉由改善基礎設施設計，提供充足的衛生條件","藉由推廣瓶裝水，提供更佳水質"],a:3,e:"水概念並不特別推廣瓶裝水作為水質改善手段，此非其目標之一。"},
{c:1,q:"取得優質水源不僅有助於衛生，也能降低罹患下列哪類疾病的風險？",o:["消化系統疾病","免疫系統疾病","神經系統疾病","呼吸系統疾病"],a:3,e:"依水概念概述，充足且優質的水資源亦有助於降低呼吸系統疾病風險。"},
/* ---- 03 溫熱舒適 Thermal Comfort ---- */
{c:2,q:"Feature T05：輻射熱舒適可透過輻射供暖與供冷元件（獨立於通風系統）於哪兩種空間類型中達成？",o:["大廳與辦公室","會議室與遠距會議室","辦公室與會議室","樓梯間與大廳"],a:0,e:"Feature T05規定輻射熱舒適系統適用於大廳與辦公室這兩類空間。"},
{c:2,q:"依WELL熱舒適概念，人體透過何種機制維持穩定的核心體溫？",o:["變溫性（Poikilothermy）","恆溫性（Homeothermy）","竊熱性（Kleptothermy）","異溫性（Heterothermy）"],a:1,e:"恆溫性係指人體透過平衡產熱與散熱，將核心體溫維持在狹窄範圍內的機制。"},
{c:2,q:"為達成Feature T05：輻射熱舒適，所有辦公室及其他經常使用空間中，須有多少比例的地板面積符合ASHRAE Standard 55-2013熱舒適規定？",o:["40%","20%","30%","50%"],a:3,e:"依規定，須有至少50%地板面積符合ASHRAE 55-2013之熱舒適要求。"},
{c:2,q:"某開放式辦公室設有大型西向窗，共29個相同工作站，其中10個緊鄰外窗。依Feature T04：個人熱控制規定，下列何者可讓使用者在其偏好溫度下工作？",o:["窗簾／百葉窗","有色玻璃","恆溫器","個人化冷暖選項"],a:3,e:"Feature T04強調提供個人化的冷暖裝置選項，讓使用者依個人偏好調整所處環境溫度。"},
{c:2,q:"於WELL熱舒適概念中，下列何者「並非」輻射式溫控系統的優點？",o:["冬季較高的相對濕度","較少粉塵傳播","節省樓地板空間","較高的平均輻射溫度"],a:3,e:"較高的平均輻射溫度並非輻射系統被列舉的優點之一。"},
{c:2,q:"依熱舒適概念，美國受調查的辦公大樓中，有多少比例達到普遍被接受的使用者滿意度目標熱環境？",o:["20%","11%","5%","27%"],a:1,e:"Feature T02：加強熱舒適概述指出，僅約11%受調查辦公建築達到普遍接受的熱環境滿意度目標。"},
{c:2,q:"依WELL熱舒適概念，有多少項主要的個人與環境變數會影響使用者的熱舒適感受？",o:["6項","4項","7項","5項"],a:0,e:"Feature T01：熱性能概述說明共有6項主要個人及環境變數影響熱舒適感受。"},
{c:2,q:"於熱舒適概念中，下列哪一項ASHRAE標準旨在提供至少80%人員認為可接受的熱環境？",o:["ASHRAE Standard 60","ASHRAE Standard 55","ASHRAE Standard 30","ASHRAE Standard 45"],a:1,e:"Feature T01：熱性能引用ASHRAE Standard 55，目標為使至少80%人員感到熱環境可接受。"},
{c:2,q:"下列何者最能描述熱舒適概念中的「恆溫性（homeothermy）」？",o:["透過內部機制維持核心體熱，並由小腦調節","不受內部因素影響而穩定外部體溫，並由杏仁核調節","平衡產熱與散熱以將核心體溫維持在36–38°C狹窄範圍內，並由下視丘調節","透過內部機制控制核心體溫，並由丘腦調節"],a:2,e:"恆溫性係指由下視丘調節、將核心體溫維持在36–38°C狹窄範圍內的生理機制。"},
{c:2,q:"為達成Feature T02：加強熱舒適Part 1「進行熱舒適調查」規定，後使用階段調查應於一年中進行幾次、於哪些月份實施？",o:["於年初進行一次","每年至少兩次，分別於6、7或8月及12、1或2月，且須於啟用後至少六個月","每年3次，分別於1、4、8月","每年4次，每財務季度一次"],a:1,e:"後使用階段熱舒適調查須於啟用滿六個月後開始，每年至少於夏季及冬季各進行一次。"},
{c:2,q:"Salesforce剛遷入芝加哥的新辦公空間，該處常態使用人數為900人。依Feature T02：加強熱舒適Part 1規定，每年至少兩次的調查所需的最低回覆率為何？",o:["80%","75%","35%","25%"],a:2,e:"依規定，此類調查所需的最低回覆率為35%。"},
{c:2,q:"若專案的熱舒適滿意度門檻超過90%以上，Feature T02：加強熱舒適可獲得幾分？",o:["1分","2分","3分","4分"],a:2,e:"當滿意度達90%以上時，該特徵可獲得3分。"},
{c:2,q:"欲符合Feature T03：熱分區規定，專案應透過該熱區內設置恆溫器，或提供下列何者以控制空間溫度？",o:["提供個人風扇與空間暖爐","寬鬆的服裝規範及公司發放的外套與毯子","工作站鄰近可開啟窗戶","供使用者於電腦或手機上操作的數位介面"],a:3,e:"除恆溫器外，亦可透過數位介面供使用者調整所在熱區的溫度。"},
{c:2,q:"除高濕度區域外，依Feature T07：濕度控制規定，機械系統應能透過下列何種方式全天維持相對濕度？",o:["增加或移除空氣中的水分","回收水資源","空氣循環","以上皆是"],a:0,e:"機械系統須具備增加或移除空氣中水分的能力，以全天維持相對濕度於規定範圍內。"},
{c:2,q:"依Feature T09β：戶外熱舒適規定，下列哪些區域須至少50%於每日採光時段一半以上時間，由樹冠、遮陽篷或其他結構提供遮蔭？",o:["廣場、座位區及其他戶外聚集區域","停車空間","人行通道與建築入口","以上皆是"],a:2,e:"Feature T09β要求人行通道與建築入口須有至少50%面積於白天一半以上時段獲得遮蔭。"},
{c:2,q:"專案為取得Feature T08β：加強可開啟窗戶Part 1「提供多種開啟模式的窗戶」積分，須透過標示提供窗戶操作指引，內容應包括下列何者？",o:["機械冷卻運作時不應開窗","高處開窗（若有）應於寒冷天氣使用","低處開窗應於溫和／溫暖天氣使用","以上皆是"],a:3,e:"窗戶操作指引須同時涵蓋低處開窗、機械冷卻運作限制及高處開窗於寒冷天氣的使用建議。"},
{c:2,q:"依Feature T01：熱性能Part 1「提供可接受的熱舒適環境」規定，商業廚房空間的最高操作溫度不得超過幾度？",o:["80°F（27°C）","75°F（24°C）","70°F（21°C）","65°F（18°C）"],a:0,e:"商業廚房空間的操作溫度上限為80°F（27°C）。"},
{c:2,q:"依Feature T02：加強熱性能Part 2「達成熱舒適」規定，後使用階段調查每年進行兩次，須於哪些特定月份實施？",o:["3、4或5月及12、1或2月","6、7或8月及12、1或2月","6、7或8月及3、4或5月","5月及11月各一次"],a:1,e:"調查須分別於夏季及冬季各實施一次。"},
{c:2,q:"對於Feature T01：熱性能專案，進行持續監測時，取樣點的數量與位置須符合何處所列規定？",o:["熱舒適指標","效能指南索引","熱參數詞彙表","效能驗證指南（Performance Verification Guidebook）"],a:3,e:"取樣點數量與位置須依效能驗證指南之規定辦理。"},
{c:2,q:"若Feature T01：熱性能之量測係由WELL效能測試人員依效能驗證指南完成，為進行重新認證，結果應提交予下列何者？",o:["USGBC","GBCI","IWBI","AIA"],a:1,e:"GBCI（Green Business Certification Inc.）負責受理此類重新認證所需之量測結果提交。"},
{c:2,q:"欲符合Feature T03：熱分區規定，每個熱區的最大面積為何？",o:["650平方英尺或10人，取兩者較大者","750平方英尺或10人，取兩者較大者","850平方英尺或20人，取兩者較大者","650平方英尺或5人，取兩者較大者"],a:0,e:"每個熱區最大面積為650平方英尺或可容納10人，以兩者中較大者為準。"},
{c:2,q:"Feature T05：輻射熱舒適要求專案須具備下列何項條件？",o:["使用獨立控制的通風系統","使用輻射系統並搭配私人控制的通風系統","使用輻射系統並搭配獨立控制的通風系統","使用輻射系統並搭配私人控制的通風系統"],a:2,e:"Feature T05要求輻射系統須獨立於通風系統之外運作，且通風系統須為獨立控制。"},
{c:2,q:"下列哪一項WELL熱舒適特徵要求專案檢查建築內的熱舒適參數，以作為建築管理者及使用者採取適當行動的回饋依據？",o:["T01熱性能","T02加強熱舒適","T05輻射熱舒適","T06熱舒適監測"],a:3,e:"Feature T06：熱舒適監測要求持續量測相關參數，提供管理者與使用者作為調整依據。"},
{c:2,q:"下列哪一項WELL熱舒適特徵要求專案設計戶外空間以避免過度風力，並透過遮蔭等策略管理升高的溫度？",o:["T09β戶外熱舒適","T03熱分區","T02加強熱舒適","T01熱性能"],a:0,e:"Feature T09β戶外熱舒適聚焦於降低過度風力影響並透過遮蔭等方式管理戶外高溫。"},
{c:2,q:"依Feature T07：濕度控制Part 1「管理相對濕度」規定，機械系統須具備將相對濕度維持在何範圍的能力？",o:["0%至40%","30%至60%","15%至30%","40%至70%"],a:1,e:"機械系統應能將相對濕度維持在30%至60%之間。"},
{c:2,q:"在評估使用者滿意度時，下列哪一項WELL熱舒適特徵要求專案提供高水準的熱舒適？",o:["Feature T01：熱性能","Feature T02：加強熱舒適","Feature T03：熱分區","Feature T06：熱舒適監測"],a:1,e:"Feature T02加強熱舒適的核心要求即為提供高水準的整體熱舒適滿意度。"},
{c:2,q:"下列哪一項WELL熱舒適特徵要求專案創造能為多數使用者提供舒適熱條件的室內熱環境，以支持其健康、福祉與生產力？",o:["Feature T01：熱性能","Feature T03：熱分區","Feature T04：個人熱控制","Feature T06：熱舒適監測"],a:0,e:"Feature T01熱性能為熱舒適概念中最基礎的先決條件，強調為多數使用者提供舒適熱環境。"},
{c:2,q:"依Feature T09β：戶外熱舒適Part 1「管理戶外高溫」規定，人行通道與建築入口須有至少多少比例，於每日採光時段一半以上時間由樹冠、遮陽篷或其他結構遮蔭？",o:["25%","50%","75%","80%"],a:1,e:"至少50%的人行通道與建築入口須符合遮蔭時間規定。"},
{c:2,q:"依Feature T08β：加強可開啟窗戶規定，專案設計窗戶時應符合下列何項條件？",o:["窗戶操作控制裝置設於完成地板面以上1.7公尺以上","窗戶操作控制裝置設於完成地板面以上1.7公尺","窗戶操作控制裝置設於完成地板面以上不到1.7公尺","窗戶操作控制裝置設於完成地板面以上不超過1.7公尺"],a:3,e:"窗戶操作控制裝置的設置高度不得超過完成地板面以上1.7公尺（5.6英尺），以利所有使用者操作。"},
{c:2,q:"若專案選擇「年度測試」方式達成Feature T01：熱性能，須提交下列何種驗證方法予IWBI？",o:["持續報告","技術文件","現場照片","建築圖說"],a:0,e:"選擇年度測試方式時，須以持續報告作為驗證方法提交。"},
/* ---- 04 聲音 Sound ---- */
{c:3,q:"依Feature S01：聲音地圖Part 1「標示聲學分區」規定，某新建辦公專案作為聲音地圖計畫的一部分，應標示哪些聲學分區？",o:["噪音區、混合區、設備區與安靜區","噪音區、安靜區、混合區與動線區","大聲區、安靜區、混合區與動線區","大聲區、安靜區、設備區與動線區"],a:2,e:"須標示大聲區、安靜區、混合區與動線區；若大聲區直接與安靜區相鄰，須訂定聲音傳遞的減緩計畫。"},
{c:3,q:"某建築裝修專案包含一間屬於類別3空間的自助餐廳。依Feature S02：最大噪音位準Part 1「限制背景噪音位準」規定，若欲獲得最高積分，該空間的最大聲壓位準（SPL）為多少dBA？",o:["50 dBA","45 dBA","55 dBA","60 dBA"],a:2,e:"類別3空間欲取得最高積分，其SPL須≤55 dBA。"},
{c:3,q:"依Feature S03：聲音屏障Part 2「達成牆面聲音隔離」規定，專注工作及其他經常使用空間之間的最低噪音隔離等級（NIC）或加權差值位準（Dw）為何？",o:["10","40","55","60"],a:1,e:"專注工作空間之間須達到最低NIC或Dw值40。"},
{c:3,q:"依Feature S03：聲音屏障Part 1「設計牆面與門的聲音隔離」規定，連接兩個可使用房間的門及通往機械設備室的門，最低要求為何？",o:["門須為非中空芯材，最低STC/Rw為40，並設有密封條","門須為非中空芯材，並設有密封條","門須為非中空芯材，最低STC/Rw為30，並設有密封條","門須為非中空芯材，最低STC/Rw為35，並設有密封條"],a:2,e:"門須為非中空芯材、最低STC/Rw為30，且於門檻、門框及底部設有密封條。"},
{c:3,q:"WELL聲音概念旨在強化下列何者？",o:["平靜感與使用者生產力","社交互動與體能","使用者健康與福祉","使用者滿意度與獲利能力"],a:2,e:"聲音概念旨在藉由辨識並緩解影響使用者體驗的聲學舒適參數，強化使用者健康與福祉。"},
{c:3,q:"依Feature S02：最大噪音位準，研究顯示暴露於交通噪音下，可能提高罹患下列哪些健康問題的風險？",o:["焦慮與頭痛","高血壓與焦慮","糖尿病、中風與高血壓","慢性壓力與心臟病發作"],a:2,e:"研究顯示交通噪音暴露與心血管疾病、糖尿病、高血壓、中風及憂鬱等風險增加有關。"},
{c:3,q:"依Feature S02：最大噪音位準，下列何者為針對室內噪音來源提出的解決方案之一？",o:["為設備室加裝隔音","選用聲音等級較低的HVAC設備","提供使用者降噪耳機","使用隔音窗"],a:1,e:"室內噪音源可透過選用聲音等級較低的HVAC設備並於風管內降低音量來控制。"},
{c:3,q:"為符合Feature S05：降噪表面Part 1「實施降噪表面」最低規定，開放式工作空間須符合下列哪一項天花板最低NRC/aw值？",o:["所有可用天花板面積達0.90","至少50%可用天花板面積達0.75","至少75%可用天花板面積達0.75","所有可用天花板面積達0.75"],a:2,e:"開放式工作空間天花板最低NRC/aw須為0.75，且適用於至少75%的可用天花板面積。"},
{c:3,q:"下列哪一項WELL特徵要求專案擬定聲學計畫，辨識可能對室內空間造成負面影響的噪音來源？",o:["Part 2：提供聲學設計計畫","Feature S01：聲學計畫","Feature S01：聲音地圖","Feature S01：聲音規劃"],a:2,e:"Feature S01聲音地圖要求擬定聲學計畫，辨識可能影響室內空間的噪音來源。"},
{c:3,q:"依Feature S02：最大噪音位準Part 1「限制背景噪音位準」規定，若欲獲得3分，開放式用餐區（類別3空間）的最大聲壓位準（SPL, dBA）為多少？",o:["55 dBA","45 dBA","60 dBC","50 dBC"],a:0,e:"開放式用餐區欲取得3分，其SPL須≤55 dBA。"},
{c:3,q:"Feature S04：混響時間指出，混響時間係指聲音自初始脈衝位準衰減多少分貝所需的時間？",o:["55 dB","60 dB","50 dB","45 dB"],a:1,e:"混響時間定義為聲音自初始脈衝位準衰減60 dB所需的時間長度。"},
{c:3,q:"若選用Feature S03：聲音屏障Part 2「達成牆面聲音隔離」之選項2「語音隱私」，封閉式辦公室最低NIC+NC或Dw+LAeq為何？",o:["90","80","70","20"],a:1,e:"封閉式安靜區（包含封閉式辦公室）的NIC+NC或Dw+LAeq最低須為80。"},
{c:3,q:"依Feature S04：混響時間，下列何者為降低混響時間的解決方案？",o:["使用木製家具","採購能提升語音清晰度的電信／視聽設備","增加反射面（如玻璃或石材）","於天花板與牆面增加吸音表面材質"],a:3,e:"於天花板、牆面及家具增加吸音表面材質，可有效降低混響時間。"},
{c:3,q:"為達成Feature S04：混響時間Part 1「達到混響時間門檻值」選項1的積分，語音相關空間的最大混響時間為何？",o:["0.5 ≤ t ≤ 0.8秒","0.6 ≤ t ≤ 1.0秒","0.8 ≤ t ≤ 1.0秒","1.0 ≤ t ≤ 1.4秒"],a:2,e:"語音相關空間之混響時間須落在0.8至1.0秒之間。"},
{c:3,q:"多項研究顯示，下列何者是引發抱怨並導致使用者不滿的主要原因？",o:["難喝的水","內部產生的噪音","停車位不足","廁所不足"],a:1,e:"研究顯示，建築內部產生的噪音是造成使用者不滿與抱怨的主要來源之一。"},
{c:3,q:"依Feature S06：最低背景聲音Part 1「提供最低背景聲音」規定，聲音遮蔽系統須經調校，使標示為安靜區的封閉房間內聲壓位準不超過多少？",o:["42 dBA","38 dBA","48 dBA","46 dBA"],a:0,e:"開放式安靜區／動線區不超過48 dBA，而封閉式安靜區房間不得超過42 dBA。"},
{c:3,q:"依Feature S03：聲音屏障Part 1「設計牆面與門的聲音隔離」規定，相鄰安靜區之間的室內牆面最低音傳等級（STC）為何？",o:["50","45","60","40"],a:0,e:"相鄰安靜區之間的室內牆面須達最低STC或Rw值50。"},
{c:3,q:"當空間內部或外部噪音增加時，研究發現使用者會出現下列何種情形？",o:["容易分心、聽力受損且較不願合作","容易分心、生產力下降且容易職業倦怠","生產力下降、較不願合作且情緒低落","焦慮、生產力下降且情緒低落"],a:1,e:"噪音增加會使使用者容易分心、生產力下降並更容易職業倦怠。"},
{c:3,q:"紐約市中心一棟10層樓辦公大樓正申請WELL認證，因鄰近街道噪音，團隊須有意識地規劃樓層配置。典型辦公室可依用途劃分為哪四種主要類型？",o:["專注、協作、社交、學習","協作、專注、社交、教學","專注、社交、教學、休息室","休息室、教學、協作、社交"],a:0,e:"典型辦公樓層可劃分為專注、協作、社交與學習四種主要用途空間。"},
{c:3,q:"依Feature S02：最大噪音位準規定，下列何者為針對外部噪音提出的解決方案之一？",o:["為設備室加裝隔音","選用聲音等級較低的HVAC設備","提供使用者降噪耳機","使用隔音窗"],a:3,e:"外部噪音可透過建築外牆、隔音窗及各類開口的隔音處理來控制。"},
{c:3,q:"依Feature S02：最大噪音位準Part 1「限制背景噪音位準」規定，某新建公寓大樓須檢測臥室背景噪音位準，確保平均值不超過35 dBA。此背景噪音須量測至少多長的時間？",o:["一天中任意6小時","涵蓋晚間10點至隔天早上7點的12小時時段","24小時","晚間8點至隔天早上8點的12小時"],a:1,e:"住宅單元臥室背景噪音須於涵蓋晚間10點至早上7點之至少12小時期間量測，平均不得超過35 dBA。"},
{c:3,q:"依Feature S03：聲音屏障，有證據顯示多層住宅中的噪音干擾與下列哪些健康問題有關？",o:["憂鬱與焦慮","心理健康不佳與感知壓力","記憶力衰退與憂鬱","焦慮與感知壓力"],a:1,e:"研究顯示，多層住宅中經牆面或門傳遞的噪音干擾與居民心理健康不佳及感知壓力增加有關。"},
{c:3,q:"專案中規劃了一間用於協作的會議室。為符合Feature S03：聲音屏障Part 1「設計牆面與門的聲音隔離」規定，該會議室最低STC或Rw要求為何？",o:["45","50","60","55"],a:3,e:"依空間分類，協作用會議室之最低STC或Rw要求為55。"},
{c:3,q:"混響時間的長短是下列哪些因素的函數？",o:["吸音性質、房間高度與門的數量","房間高度、表面積與表面材質之吸音性質","房間大小、表面積與表面材質之吸音性質","房間大小、表面積與門的數量"],a:2,e:"Feature S04指出，混響時間長短取決於房間大小、表面積與表面材質的吸音性質。"},
{c:3,q:"Feature S04：混響時間概述提及，教室內高混響時間可能造成多項負面影響。下列何者「並非」其中之一？",o:["聽力喪失","降低認知能力","降低記憶保留","降低聽障及非母語使用者的語音清晰度理解"],a:0,e:"高混響時間會提高學生的聽覺負荷，降低認知、記憶保留與語音清晰度理解，但並不會直接造成聽力喪失。"},
{c:3,q:"某新學習中心欲改善教室內的混響時間。下列哪一組做法有助於達成此目標？",o:["降低反射聲能、增加反射面並加入吸音材","增加吸音材、改變房間幾何並增加反射面","降低反射聲能、改變房間幾何並加入吸音材","降低反射面、改變房間幾何並加入吸音材"],a:3,e:"可透過減少反射面、視情況調整房間幾何形狀，並增加吸音表面材質來改善混響時間。"},
{c:3,q:"Feature S05：降噪表面中，一種可降低混響、大幅減少人聲頻率範圍聲音，並顯著減少反射聲堆積的作法稱為？",o:["聲學舒適","聲學處理（Acoustical Treatment）","語音清晰度","混響時間"],a:1,e:"聲學處理能大幅降低人聲頻率範圍的聲音，減少不必要的反射聲堆積。"},
{c:3,q:"房間中的哪個區域通常提供最大覆蓋面積，讓高吸音材質發揮最佳降混響效果？",o:["地板","天花板","牆面","家具"],a:1,e:"Feature S05：降噪表面指出，天花板通常提供最大覆蓋面積，是安裝高吸音材質的理想位置。"},
{c:3,q:"某設有專屬用餐區的新專案欲透過增加吸音表面獲得積分。若欲取得2分，用餐區天花板的最低NRC/aw為何？",o:["至少75%可用天花板面積達0.80","所有可用天花板面積達0.70","所有可用天花板面積達0.90","至少50%可用天花板面積達0.60"],a:2,e:"Feature S05 Part 1規定，用餐區天花板最低NRC/aw須為0.90，且適用於所有可用天花板面積。"},
{c:3,q:"Feature S03：聲音屏障的核心目的為何？",o:["提高水平相鄰封閉空間之間的語音隱私程度，並凸顯可能妨礙聲學舒適的設計限制","降低水平相鄰封閉空間之間的語音隱私程度，並凸顯可能妨礙聲學舒適的設計限制","提高垂直相鄰封閉空間之間的語音隱私程度，並凸顯可能妨礙聲學舒適的設計限制","提高水平相鄰封閉空間之間的語音隱私程度，並凸顯可能妨礙熱舒適的設計限制"],a:0,e:"Feature S03旨在提高水平相鄰封閉空間之間的語音隱私程度，並找出可能妨礙聲學舒適的設計限制因素。"},
/* ---- 05 營養 Nourishment ---- */
{c:4,q:"某辦公大樓內的咖啡廳近期調整菜單，納入更營養的餐點選項，目前每日供應：火腿三明治、起司三明治、漢堡、炸魚、義大利麵、雞肉飯、柳橙、蘋果片、蔓越莓乾。為符合Feature N01：蔬果規定，該餐廳還應額外供應下列何種食品？",o:["炸青番茄","不需要，現有規定已符合","無額外添加糖的水果杯","紅蘿蔔與芹菜條"],a:3,e:"現有菜單缺乏非水果類蔬菜選項，須額外增加如紅蘿蔔、芹菜條等蔬菜品項以符合Feature N01規定。"},
{c:4,q:"某建築業主正全面翻修餐廳菜單，以符合Feature N03：精製原料規定。下列何者為新菜單須符合的規定？",o:["部分氫化油最多可用於50%的餐點選項","任何飲料含糖量不得超過25公克","小麥麵粉禁止作為任何餐點的主要原料","所有含常見過敏原的食品須於獨立販賣機供應"],a:1,e:"Feature N03規定所有飲料的含糖量不得超過25公克。"},
{c:4,q:"某業主決定限制所有高度加工飲料、零食及餐點的供應。依Feature N05：人工添加物規定，下列敘述何者正確？",o:["單份非飲料食品含糖量不得超過40公克","至少50%食品須不含高果糖玉米糖漿及／或其他人工甜味劑","特定色素須於最長三年內逐步淘汰","不得含有任何人工色素或香料"],a:2,e:"依規定，特定人工色素須於最長三年內逐步淘汰。"},
{c:4,q:"依Feature N01：蔬果規定，2013年全球因蔬果攝取不足導致約多少人死亡？",o:["520萬人","5,200萬人","5.02億人","5.2萬人"],a:0,e:"依Feature N01概述，2013年全球約有520萬人因蔬果攝取不足而死亡。"},
{c:4,q:"物業經理應在何處確保WELL認證物業所販售／供應的所有食品清楚標示食物過敏原？",o:["包裝、菜單或標示的決策點","僅於食品包裝上","僅於外帶菜單上","僅於員工資訊卡上"],a:0,e:"Feature N02：營養透明度Part 1「提供營養資訊」要求於包裝、菜單或標示等決策點清楚標示過敏原。"},
{c:4,q:"依Feature N10：食物準備Part 1「提供餐食支持」規定，中小學商業廚房空間須符合下列何項要求？",o:["鍋具、平底鍋、刀具及砧板","供應預先準備餐點的設備","加熱食物的設備","空間內具備適當廚房設備與基礎設施可現場準備並供應餐點；於上課日至少現場準備並供應一餐"],a:3,e:"中小學商業廚房空間須具備現場準備及供應餐點的設備與基礎設施，且於上課日至少準備供應一餐。"},
{c:4,q:"對於每日銷售或提供食物的商業用餐空間，依Feature N01：蔬果規定，應採取下列何種蔬果推廣策略？",o:["以虛擬人物與卡通明星進行數位推廣","於收銀台列表展示","以圖示、不同顏色及粗體字進行視覺標示","印製海報張貼於空間周圍"],a:2,e:"蔬果推廣須以圖示、色彩區分及粗體字等視覺方式，於菜單或標示中凸顯蔬果選項。"},
{c:4,q:"Feature N05：人工添加物的核心目的為何？",o:["協助建築使用者避免食品及飲料中的色素、香料、甜味劑及防腐劑","消除所有於物業內販售或供應之食品及飲料中的人工添加物","協助建築使用者避免食品及飲料中的精製麩質及化學提煉油脂","協助建築使用者遵循原始人飲食計畫"],a:0,e:"Feature N05目的在於協助使用者避免攝取食品及飲料中的人工色素、香料、甜味劑及防腐劑。"},
{c:4,q:"下列哪個身體系統含有最大量的細菌儲藏庫，對免疫健康具有一定作用？",o:["循環系統","皮膚系統","消化系統","心血管系統"],a:2,e:"消化系統中含有人體最大量的細菌群，對免疫健康扮演重要角色。"},
{c:4,q:"某建築管理者為使用者舉辦午餐聚會，並要求餐廳清楚標示常見過敏原。依Feature N09：特殊飲食規定，下列何者「不需」標示？",o:["魚類","咖啡因","大豆","蛋"],a:1,e:"咖啡因並非Feature N09要求須標示的常見過敏原之一。"},
{c:4,q:"某使用者於餐廳購買現成午餐及包裝零食。依Feature N02：營養透明度規定，下列何者「並非」這些食品必須標示的項目？",o:["總熱量","巨量與微量營養素含量","含糖量","是否含基因改造成分（GMO）"],a:3,e:"是否含GMO並非Feature N02要求的必要標示項目。"},
{c:4,q:"某建築餐廳依Feature N04：食品廣告近期更新標示。下列何種食品或飲料不得被廣告或推廣？",o:["油炸食品選項","含高糖分的無糖飲料（如蘋果汁）","含常見過敏原的食品","非在地生產的食品"],a:0,e:"Feature N04要求不得廣告或推廣油炸食品等不健康選項。"},
{c:4,q:"下列何者為Feature N04：食品廣告的目標之一？",o:["完全僅推廣天然全食物廣告","勸阻購買含糖及含咖啡因飲料","勸阻使用者食用任何含添加糖的食品","鼓勵使用者選擇並攝取更健康的食物選項"],a:3,e:"Feature N04目標在於鼓勵使用者選擇並攝取更健康的食物選項。"},
{c:4,q:"為符合Feature N06：份量大小Part 1「推廣健康份量」規定，中學環境中非圓形餐盤的面積不得超過多少？",o:["69平方英吋（445平方公分）","70平方英吋（450平方公分）","79平方英吋（507平方公分）","80平方英吋（516平方公分）"],a:2,e:"自助式供餐之非圓形餐盤，於中學情境下總表面積不得超過79平方英吋（507平方公分）。"},
{c:4,q:"為符合Feature N06：份量大小規定，供應給顧客的所有碗須符合下列何者？",o:["成人用碗最大不得超過16盎司（473毫升）","顧客可選擇8盎司或16盎司（價格不同）","碗最大不得超過8盎司（237毫升）","顧客可選擇16盎司或20盎司（價格不同）"],a:0,e:"成人用碗最大不得超過16盎司（473毫升）。"},
{c:4,q:"為符合Feature N06：份量大小規定，供中學學生使用的所有非圓形餐盤須符合下列何者？",o:["總表面積不得超過69平方英吋（445平方公分）","總表面積不得超過70平方英吋（450平方公分）","總表面積不得超過79平方英吋（507平方公分）","總表面積不得超過80平方英吋（516平方公分）"],a:2,e:"中學情境下非圓形餐盤總表面積上限為79平方英吋（507平方公分）。"},
{c:4,q:"建築業主要求餐廳著重健康飲食選項。為降低不自覺過度飲食並鼓勵健康飲食習慣，每日供應飲料的最大杯型應為多少？",o:["296毫升（10盎司）","240毫升（8盎司）","480毫升（16盎司）","355毫升（12盎司）"],a:2,e:"Feature N06：份量大小規定每日供應飲料的最大杯型為480毫升（16盎司）。"},
{c:4,q:"為符合Feature N09：特殊飲食規定，外燴活動須符合下列何者？",o:["活動前，員工及客戶須提交所有飲食偏好","須提供不含常見過敏原的主餐選項","須遵守所有宗教飲食限制","所有食物須標示最常見的食物過敏原"],a:1,e:"外燴活動須提供不含常見過敏原（如麩質、堅果、乳製品等）的主餐選項。"},
{c:4,q:"依Feature N09：特殊飲食規定，有食物過敏或飲食限制的員工，可要求下列哪些選項，但下列何者除外？",o:["無麩質選項","無糖選項","全素選項","無蛋選項"],a:1,e:"無糖選項並非Feature N09要求提供的特殊飲食選項之一。"},
{c:4,q:"為符合Feature N11：負責任食品生產規定，每日現場銷售或供應的農產品須符合下列何者？",o:["至少50%農產品及25%肉類須為有機認證","須依食品標示法規進行顏色編碼","須標示USDA有機標章及公平貿易標章","須標示是否含基因改造成分（GMO）"],a:0,e:"Feature N11規定至少50%農產品及25%肉類須具備有機認證。"},
{c:4,q:"依Feature N11：負責任食品生產規定，每日現場銷售或供應的所有肉類、蛋類及乳製品須具備下列哪些標章？",o:["聯邦有機認證與公平貿易認證","僅公平貿易認證","聯邦有機認證與人道飼養認證","僅人道飼養認證"],a:2,e:"依規定，肉、蛋、乳製品須同時具備聯邦有機認證與人道飼養認證。"},
{c:4,q:"為符合Feature N12：食物生產規定，須為所有建築使用者提供何種規模及位置的園藝空間或溫室？",o:["每位使用者0.1平方公尺，且位於專案邊界0.4公里內","每位使用者0.3平方公尺，且位於專案邊界0.4公里內","每位使用者0.5平方公尺，且位於專案邊界1.6公里內","每位使用者0.2平方公尺，且位於專案邊界2.4公里內"],a:0,e:"依Feature N12規定，須提供每位使用者至少0.1平方公尺（1平方英尺），且位於專案邊界0.4公里（0.25英里）內的園藝空間。"},
{c:4,q:"依Feature N12：食物生產規定，下列何者「並非」用以栽種及維護園藝空間所需提供的項目？",o:["栽培介質","園藝工具","戶外照明","灌溉設備"],a:2,e:"戶外照明並非Feature N12要求提供的項目之一。"},
{c:4,q:"下列哪一項WELL概念旨在協助使用者做出更明智的選擇？",o:["運動","營養","營養與光環境","光環境"],a:1,e:"營養概念旨在透過提供透明資訊，協助使用者做出更明智的飲食選擇。"},
{c:4,q:"為符合Feature N06：份量大小規定，建築餐廳菜單中至少一半的主餐項目須符合下列何者？",o:["提供熱量650大卡或以下、售價較大份量便宜的版本","提供熱量550大卡或以下、售價較大份量便宜的版本","提供熱量575大卡或以下的素食版本","提供熱量425大卡或以下的素食版本"],a:0,e:"至少一半主餐項目須提供650大卡或以下、且售價低於原份量的替代選項。"},
{c:4,q:"Beverly是某辦公大樓的健康計畫經理，希望將營養教育納入健康計畫。為符合Feature N07：營養教育規定，下列何者屬於可接受的營養教育機會？",o:["聚焦可食用植物的園藝或種植工作坊，並融入實作學習機會","參訪當地雜貨店，強調健康飲食","與常態使用者籌辦健康主題聚餐社團","每月引進植物性餐車供常態使用者使用"],a:0,e:"融入實作學習的可食用植物園藝或種植工作坊，屬於符合規定的營養教育活動之一。"},
{c:4,q:"Feature N08：正念飲食規定空間須設有專屬用餐空間，且合格員工須有每日用餐休息時間。此專屬用餐空間的文件須以何種驗證方法提交予IWBI？",o:["室內設計圖說","現場照片","技術文件","政策及／或營運排程"],a:3,e:"專屬用餐空間相關規定須以政策及／或營運排程作為驗證方法提交。"},
{c:4,q:"溫哥華一棟辦公大樓希望於餐廳以外提供專屬用餐空間。為符合Feature N08：正念飲食規定，該專屬用餐空間須提供下列何者？",o:["餐具與調味料站","可容納25%常態使用者的座位","防護措施以隔絕環境因素","飲水與咖啡站"],a:2,e:"專屬用餐空間須提供防護措施，隔絕直射陽光、雨水及風等環境因素影響。"},
{c:4,q:"世界過敏組織（World Allergy Organization）報告指出，全球各國食物過敏的盛行率呈現何種趨勢？",o:["上升","下降","持平","高度變異"],a:0,e:"依Feature N09概述，全球食物過敏盛行率呈現持續上升的趨勢。"},
{c:4,q:"為因應特殊飲食需求，主餐選項須符合下列哪些條件？",o:["無花生","無麩質","無乳製品","以上皆是"],a:3,e:"Feature N09要求主餐選項須同時提供無花生、無麩質及無乳製品等多種選擇，以滿足特殊飲食需求。"},
/* ---- 06 運動 Movement ---- */
{c:5,q:"全球成人人口中，約有多少比例被推估為缺乏身體活動（physically inactive）？",o:["50%","25%","35%","15%"],a:1,e:"依運動概念背景資料，全球約25%成人被推估為缺乏身體活動。"},
{c:5,q:"某4層樓既有建築進行大規模翻新，將原本8間獨立套房整合為一間企業總部，新租戶希望設置開放式樓梯連接四個樓層以視覺化提升步行意願。依Feature V03：動線網絡Part 3「促進可視樓梯」規定，至少應有一座樓梯設於何處？",o:["電梯或手扶梯之前","靠近洗手間","大廳可視範圍內","靠近停車區"],a:0,e:"至少一座對常態使用者開放、服務所有樓層的樓梯，須設於電梯／手扶梯之前，包含實體與視覺上的位置。"},
{c:5,q:"於通往辦公室途中的大廳樓梯，為符合Feature V03：動線網絡Part 1「設計美觀樓梯」規定，該對常態使用者開放的樓梯應納入下列何種設計元素？",o:["決策點標示指引使用者前往樓梯","禁菸標示","自然設計元素（如室內植栽）","設有可移動座椅與桌子的休憩區"],a:2,e:"樓梯的美觀設計須於每層樓至少納入兩項獨立策略，其中之一即為自然設計元素。"},
{c:5,q:"某建築大廳與中央樓梯間陳列多幅大型畫作。依Feature V03：動線網絡Part 1「設計美觀樓梯」規定，該樓梯還須具備下列何種元素才能符合資格？",o:["音樂","鼓勵使用樓梯的標示","樓梯淨寬至少1.4公尺（56英吋）","飲水機"],a:0,e:"除藝術品外，須於每層樓自音樂、光照、窗景、自然元素及遊戲化等策略中，另外納入至少一項。"},
{c:5,q:"為符合Feature V09：身體活動促進Part 1「提供合格員工誘因」規定，雇主應實施下列哪一項誘因策略？",o:["每月獎勵每週至少3天採替代交通方式的使用者50美元補助","於餐廳提供額外折扣","提供公司贊助的安全裝備，如安全帽及照明燈","彈性工時以配合身體活動安排"],a:3,e:"專案須至少提供兩項身體活動促進計畫，彈性工時以配合身體活動安排即為其中之一。"},
{c:5,q:"15名員工正為參加城市馬拉松進行訓練，全年皆有參與各項活動。假設雇主政策符合Feature V09：身體活動促進Part 1規定，每位員工可享有下列何種權益？",o:["補助參加運動賽事的費用","補助50%用於追蹤身體活動與飲食習慣的軟體或穿戴裝置費用","每月由認證私人教練提供現場訓練課程","依身體活動參與程度降低健康保險保費"],a:3,e:"專案須提供至少兩項計畫以取得此積分，其中之一即為依身體活動參與程度降低健康保險保費。"},
{c:5,q:"某公司正為100名辦公室員工訂購新椅子。依Feature V02：人因工作站設計Part 3「提供椅子可調整性」規定，下列何者「並非」椅子須具備的條件？",o:["可調式座椅高度","腰部支撐","可調式座深","可拆卸輪子"],a:3,e:"可拆卸輪子並未列於Part 3「提供椅子可調整性」的要求項目中。"},
{c:5,q:"為符合Feature V05：基地規劃與選址Part 1「選擇適合步行街道的基地」規定，最低步行分數（Walk Score）須為多少？",o:["80","50","70","40"],a:2,e:"該規定要求基地所在區域最低步行分數（Walk Score）須達70。"},
{c:5,q:"為達成WELL先決條件Feature V01：活躍建築與社區，專案須自設計導向優化特徵中取得至少一分。下列哪一項優化特徵可用以達成此分？",o:["Feature V02：人因工作站設計","Feature V08：身體活動空間與設備","Feature V06：身體活動機會","Feature V10：自我監測"],a:1,e:"專案須自Feature V03動線網絡、V04活躍使用者設施、V05基地規劃與選址、V08身體活動空間與設備中取得至少一分。"},
{c:5,q:"某辦公大樓新進員工選擇每日騎自行車上班以避免開車。依Feature V04：活躍使用者設施規定，下列何者為必要規定？",o:["提供自行車鎖及每年175美元的替代交通補助","提供打氣筒及每月15美元補助","為每位使用者提供免費有遮蔽且附私人鎖的自行車架","提供自行車維修工具（打氣筒、補胎工具及六角扳手）"],a:3,e:"Feature V04要求提供基本自行車維修工具，包含打氣筒、補胎工具及六角扳手等。"},
{c:5,q:"為達成Feature V08：身體活動空間Part 2「提供戶外身體活動空間」規定，某已取得WELL認證的物業可能為使用者提供下列何種設施？",o:["距建築1.6公里處設有長椅的步道","位於當地大學、可透過定期接駁往返的戶外跑道設施","具備全天候設備的健身區","距建築1公里處的網球場"],a:2,e:"戶外身體活動空間可包含具全天候設備的健身區，供使用者於戶外進行運動。"},
{c:5,q:"為鼓勵替代交通與日常健身，某物業經理近期於一處都會物業安裝淋浴間與更衣室，前100名常態使用者提供1間淋浴間與更衣室，其後每150名常態使用者再增設1間。為符合Feature V04：活躍使用者設施Part 2規定，還須具備下列何種額外設施？",o:["每間淋浴間配備2個置物櫃","每間淋浴間配備5個置物櫃","每10名常態使用者配備1台跑步機","每5名常態使用者配備1台跑步機"],a:1,e:"每間淋浴設施須搭配至少5個置物櫃。"},
{c:5,q:"某員工經常使用其辦公大樓健身房內的跑步機。依Feature V08：身體活動空間與設備Part 1「提供室內活動空間」規定，除跑步機外，她還應能使用下列何種額外設施？",o:["橢圓機","補水站","自由重量器材","划船機"],a:2,e:"Part 1要求提供至少兩種運動設備類型，跑步機搭配自由重量器材是常見組合之一。"},
{c:5,q:"某使用者於物業內的健身設施運動後，若該建築符合Feature V04：活躍使用者設施Part 2規定，她可使用下列何種設施？",o:["運動後伸展設備","淋浴間及置物櫃","附水果及補水站的休憩區","運動後伸展設備及置物櫃"],a:1,e:"Feature V04要求淋浴站及置物櫃須設於專案邊界200公尺（650英尺）步行距離內。"},
{c:5,q:"一間有300名員工、每人皆有獨立工作站的公司，為取得Feature V07：主動式家具1分，可提供下列何種主動式家具？",o:["100台跑步機辦公桌","150張可調高度站立辦公桌及150組桌面高度調整架","150組桌面高度調整架","50台跑步機辦公桌"],a:2,e:"提供150組桌面高度調整架，覆蓋一定比例員工，即可符合Feature V07取得1分的規定。"},
{c:5,q:"某小型辦公室有10名員工，其中5個工作站各有一張標準辦公桌及一張置物邊桌。依Feature V02：人因設計Part 2「提供可調高度工作面」規定，為降低久坐，其餘5個工作站中的3個應具備下列何者？",o:["平衡球椅","跑步機辦公桌","可調高度工作面","具可調高度的工作站椅"],a:2,e:"為降低久坐，須為部分工作站提供可調高度工作面。"},
{c:5,q:"某建築近期依Feature V08：身體活動空間與設備Part 1「提供室內活動空間」翻新其健身房。使用者可能會看到下列哪一種阻力訓練設備？",o:["平衡球","瑜珈墊","爬梯機","自由重量器材"],a:3,e:"專案團隊亦可利用位於WELL專案邊界200公尺內的共享健身房或類似身體活動空間。"},
{c:5,q:"某5層樓辦公大樓的樓梯設於主入口7.5公尺範圍內。下列哪一項設計元素「無法」促進樓梯使用並降低對電梯的依賴？",o:["至少108勒克斯的照明水準","具備戶外景觀的窗戶","裝飾甕內的植栽","音樂"],a:0,e:"樓梯使用時的照明水準須至少達到215勒克斯（20呎燭光），108勒克斯不足以符合規定。"},
{c:5,q:"運動概念指出，若全球身體活動不足的比例降低25%，約可避免多少人死亡？",o:["750,000人","500,000人","1,000,000人","850,000人"],a:2,e:"WELL運動概念指出，若全球身體活動不足降低10%，可避免逾50萬人死亡；若降低25%，則可避免逾100萬人死亡。"},
{c:5,q:"下列何者「並非」被視為阻礙身體活動的主要因素之一？",o:["時間","醫療成本","動機","天候不佳"],a:1,e:"醫療成本並非文獻列舉的主要阻礙身體活動因素，時間、動機及天候不佳皆為常見障礙。"},
{c:5,q:"依WELL v2™規定，遊戲化（gamification）可用於鼓勵建築使用者做出下列何種行為？",o:["起身偶爾散步","提升生產力","騎自行車上班","走樓梯"],a:3,e:"遊戲化策略常被用於鼓勵使用者選擇走樓梯，以增加日常身體活動量。"},
{c:5,q:"依Feature V02：人因工作站設計Part 4「提供站立工作站支持」規定，下列何者「並非」站立工作站的支持措施？",o:["腳踏墊","頻繁的帶薪休息時間","靠坐椅","防疲勞地墊"],a:1,e:"帶薪休息時間雖有幫助，但並未列於V02所定義的人因支持措施清單中。"},
{c:5,q:"為符合Feature V08：身體活動空間Part 1「提供室內活動空間」的空間與設備要求，專屬健身設施須能供多少比例的建築使用者於任何時間使用？",o:["10%","5%","3%","2%"],a:1,e:"依規定，室內健身空間應能容納至少5%常態使用者同時使用之器材數量。"},
{c:5,q:"鄰近性、連通性、密度、安全性與美觀是下列何者的核心設計主題？",o:["適合步行的社區","健康社區","綠色社區","理想社區"],a:0,e:"鄰近性、連通性、密度、安全性與美觀，是打造適合步行社區的核心設計主題。"},
{c:5,q:"依2016年一項研究估計，約有多少比例的人使用穿戴裝置或應用程式追蹤健康與體適能？",o:["13%","25%","33%","41%"],a:2,e:"依Feature V10：自我監測所引述之研究，約33%人口使用穿戴裝置或應用程式追蹤健康狀況。"},
{c:5,q:"研究顯示，人因工程計畫可將索賠案件降低最多45%，並提供多少投資報酬率（ROI）？",o:["3:1","10:1","6:1","12:1"],a:1,e:"研究顯示人因工程計畫可提供高達10:1的投資報酬率。"},
{c:5,q:"下列何者「並非」全球身體活動不足比率上升的成因之一？",o:["現代化交通工具","省力裝置","平均壽命延長","久坐型工作"],a:2,e:"現代化交通、省力裝置及久坐型工作皆為身體活動不足上升的成因，但平均壽命延長並非成因之一。"},
{c:5,q:"某專案團隊決定透過提供多組桌面高度調整架追求Feature V07：主動式家具。這也可能有助於符合下列哪一項WELLv2特徵？",o:["Feature V06：身體活動機會","Feature V04：活躍使用者設施","Feature V02：人因工作站設計","Feature V03：動線網絡"],a:2,e:"桌面高度調整架同時有助於符合Feature V02人因工作站設計中可調工作面的相關規定。"},
{c:5,q:"據報導，一般成人每日平均久坐時間約為多少小時？",o:["每日1–3小時","每日6–14小時","每日3–9小時","每日2–5小時"],a:2,e:"依運動概念概述，2011年全球成人自陳每日久坐時間介於3至9小時之間。"},
{c:5,q:"下列何者「不」屬於久坐行為？",o:["開車","於電腦前玩節奏快速的遊戲","排隊等候","坐在辦公桌前"],a:2,e:"排隊等候通常涉及站立而非久坐，因此不屬於典型的久坐行為。"},
/* ---- 07 身心健康 Mind ---- */
{c:6,q:"某非營利組織正為其外展服務設施申請WELL認證。依Feature M01：心理健康促進規定，該組織須為所有常態使用者提供何種心理健康促進計畫？",o:["至少一項計畫","至少兩項計畫","至少一項每季計畫","至少一項每週計畫"],a:1,e:"Feature M01要求至少提供兩項心理健康促進相關計畫，供所有員工與學生免費使用。"},
{c:6,q:"為取得Feature M01：心理健康促進Part 1「促進心理健康與福祉」積分，下列何者為支持並促進使用者心理健康的規定之一？",o:["每季以現場或線上方式提供心理健康與福祉的教育或宣導活動","每天早上提供含有勵志語錄與快速健康小技巧的工作休息時間","每日發送含勵志語錄與簡易健康小技巧的電子郵件","鼓勵員工申辦圖書館借閱證並提供預先核准的書單"],a:0,e:"專案須至少提供兩項免費措施之一，包括每季一次的心理健康教育或宣導活動。"},
{c:6,q:"心理健康意識已成為職場的重要議題。未能妥善處理職場心理健康議題會導致下列何種後果？",o:["員工協作專案的凝聚力降低","生產力提高，但健康風險增加","高離職率、缺勤率及意外發生機率增加","雖屬重要議題，但職場忽視心理健康並無明顯負面影響"],a:2,e:"Feature M01概述指出，忽視職場心理健康將導致高離職率、缺勤率及意外事故風險上升。"},
{c:6,q:"Alice因加班而疲憊，其辦公室設有供短暫小憩的空間。依Feature M06：修復機會規定，該空間應提供下列何種家具選項供員工放鬆？",o:["附床墊的行軍床","至少一項可完全平躺的家具選項","扶手間距至少1.8公尺的沙發","附睡袋與睡墊的空曠空間"],a:1,e:"修復空間須提供至少一項可完全平躺的家具選項，以利使用者充分休息。"},
{c:6,q:"加州某WELL建築深知員工健康對生產力、專注力甚至同事健康皆有影響。依Feature M03：心理健康服務規定，應為員工提供下列何者？",o:["每60名員工配置一名駐點諮商師","鼓勵生病員工居家休養或遠距工作的職場政策","除病假外，額外提供心理健康假","針對常見心理健康狀況進行心理健康篩檢"],a:3,e:"Feature M03要求提供常見心理健康狀況的篩檢服務。"},
{c:6,q:"Feature M05：壓力管理要求專案評估組織內部壓力，並制定紓解或調整壓力來源的計畫。此特徵的Part 1為何？",o:["制定壓力管理計畫","找出解決員工壓力的機會","處理員工壓力","由員工做出組織決策"],a:0,e:"Part 1「制定壓力管理計畫」要求專案針對此特徵擬定完整的壓力管理計畫。"},
{c:6,q:"波特蘭一家公司了解與自然的連結有助於緩解壓力。該公司可採取下列何種措施以符合Feature M02：自然與場所規定？",o:["於每層樓設置水景","融入自然建材、植栽、水景與自然景觀","補貼桌上植栽並提供照顧說明","採用自然主題壁紙與裝飾"],a:1,e:"Feature M02要求於專案中融入自然元素，包括自然建材、植栽、水景與自然景觀等。"},
{c:6,q:"華盛頓州某物業經理希望提升員工士氣與情緒。依Feature M02：自然與場所規定，她應於下列何處納入自然元素？",o:["停車場","洗手間","常用動線區域","電梯"],a:2,e:"常用動線區域是Feature M02特別強調應融入自然元素的空間之一。"},
{c:6,q:"WELL Building Standard如何定義心理健康（mental health）？",o:["生理、心理與社會福祉的基礎狀態，而非僅指沒有疾病或身心障礙","個人取得、處理及理解基本健康資訊與服務以做出適當健康決策的能力程度","旨在協助個人及社區透過提升知識或影響態度改善健康的各種學習經驗組合","個人能實現自身潛能、應對生活正常壓力、有生產力地工作，並對其社區有所貢獻的福祉狀態"],a:3,e:"依心理概念概述，心理健康被定義為個人能實現潛能、應對壓力、有效工作並貢獻社區的福祉狀態。"},
{c:6,q:"紐約某辦公大樓計畫於WELL項目組合中納入心理健康教育。下列何者符合Feature M04：心理健康教育規定？",o:["提供現場或線上的常見心理健康狀況培訓，涵蓋徵兆與症狀","僅提供現場的心理健康意識培訓","以電子郵件發送虛擬心理健康資源庫連結","於場外提供常見心理健康狀況培訓"],a:0,e:"Feature M04要求提供涵蓋徵兆與症狀的常見心理健康狀況培訓，可以現場或線上方式辦理。"},
{c:6,q:"心理健康教育應涵蓋下列哪些常見的心理健康狀況或議題？",o:["人格障礙及其他較不易識別、具污名化的狀況","憂鬱、焦慮、物質使用、壓力與社交孤立","廣泛性焦慮症與雙相憂鬱症","由壓力引起的慢性疾病"],a:1,e:"Feature M04要求心理健康教育須涵蓋憂鬱、焦慮、物質使用、壓力與社交孤立等常見議題。"},
{c:6,q:"某永續發展經理正為Feature M05：壓力管理擬定壓力管理計畫。此計畫應包含下列哪些要素的架構？",o:["為何、空間與設施","辦公桌、用餐、放鬆與分散","誰、什麼、何處、何時與可及性","員工代表、業主及專案經理"],a:2,e:"壓力管理計畫須明確列出「誰、什麼、何處、何時與可及性」等要素，以利落實。"},
{c:6,q:"依WELL Building Standard，員工需要有充分機會於非工作時間進行心理上的抽離與恢復。依Feature M06：修復機會規定，所有員工須符合下列何項要求？",o:["每週分散休息時間，最少共60小時","每11小時期間至少休息4小時","每24小時期間至少休息11小時","無最低休息時數規定"],a:2,e:"Feature M06要求所有員工每24小時期間至少須有11小時的休息時間。"},
{c:6,q:"修復空間旨在促進恢復並緩解心理疲勞或壓力。依Feature M07：修復空間規定，修復空間應被指定作為何種用途？",o:["小睡室","社區與場所用途","冥想用途","放鬆用途"],a:3,e:"Feature M07要求將修復空間明確指定為放鬆用途空間。"},
{c:6,q:"工作日休息是鼓勵員工使用修復性休息的方式之一。依Feature M07：修復空間規定，另一種鼓勵使用修復空間的方式為何？",o:["遠離工作站的帶薪休息","15分鐘的步行休息","免於參加員工會議的帶薪休息","每8小時工作日提供兩次帶薪休息"],a:0,e:"提供遠離工作站的帶薪休息，是鼓勵使用修復空間的另一種方式。"},
{c:6,q:"奧蘭多某圖書館欲符合Feature M07：修復空間規定。指定修復空間所需的最小面積為何？",o:["至少一間10英尺x10英尺的房間","至少75平方英尺，加上每位常態使用者1平方英尺，上限2,000平方英尺","至少50平方英尺，加上每位常態使用者3平方英尺，上限3,500平方英尺","至少25平方英尺，加上每位常態使用者25平方英尺，上限3,500平方英尺"],a:1,e:"修復空間最小面積為75平方英尺，加上每位常態使用者1平方英尺，最高不超過2,000平方英尺。"},
{c:6,q:"George正致力於為員工提供修復性課程，以符合Feature M08：修復性課程規定，至少須自正念培訓課程、正念課程或數位正念服務中提供兩項。此類課程對員工的費用規定為何？",o:["對所有員工免費","對合格員工補助75%","對合格員工免費或補助至少50%","對合格員工免費"],a:2,e:"此類課程須對合格員工免費，或至少補助50%費用。"},
{c:6,q:"Feature M02：自然與場所要求於專案中融入自然元素，並透過設計慶祝專案的獨特識別性、激發人類愉悅感。自然元素（如植栽與日光）已被證實具備下列哪項健康促進效益？",o:["降低工作空間的煩躁感","改善空間空氣品質","照顧桌上植栽帶來的成就感","改善工作壓力與疾病後的恢復狀況"],a:3,e:"研究顯示自然元素與日光有助於降低憂鬱與焦慮程度、提升注意力、改善工作壓力後的恢復及提升整體心理福祉。"},
{c:6,q:"為符合Feature M09：加強自然接觸規定的室內自然接觸，須有多少比例的工作站能直接視覺接觸室內植栽／水景或戶外自然區域景觀？",o:["25%","45%","75%","100%"],a:2,e:"依規定，須有至少75%的工作站能直接視覺接觸室內植栽、水景或戶外自然景觀。"},
{c:6,q:"為提供室內自然接觸，須在距離室內植栽、水景或戶外自然區域多遠範圍內，才能取得Feature M09：加強自然接觸的積分？",o:["33英尺內","50英尺內","75英尺內","82英尺內"],a:0,e:"工作站須位於距離室內植栽、水景或戶外自然區域33英尺內，方可符合此規定。"},
{c:6,q:"戒菸（Tobacco Cessation）是屬於下列哪一個概念類別的特徵？",o:["營養","空氣","心理","社區"],a:2,e:"Feature M10：戒菸屬於心理概念下的特徵。"},
{c:6,q:"西雅圖某零售建築希望限制建築內菸品的取得。依Feature M10：戒菸規定，須符合下列何項要求？",o:["禁止販售香菸","禁止販售電子菸","為菸品加註額外的致癌警示標籤","禁止販售所有菸草製品，包括電子菸"],a:3,e:"Feature M10要求禁止販售所有菸草製品，包含傳統香菸及電子菸。"},
{c:6,q:"酒精使用是全球主要風險因素之一，每年造成約多少人死亡？",o:["每年330萬人死亡","每年580萬人死亡","每年450萬人死亡","每年120萬人死亡"],a:0,e:"依Feature M11：物質使用服務概述，酒精使用每年約造成330萬人死亡。"},
{c:6,q:"Feature M11：物質使用服務要求須制定並清楚傳達物質濫用政策予所有常態使用者。該政策須涵蓋下列何者以符合此特徵規定？",o:["場內非法藥物使用","現場酒精使用及合法娛樂性藥物使用","僅限現場酒精使用","現場處方藥物使用"],a:1,e:"物質濫用政策須涵蓋現場酒精使用及合法娛樂性藥物使用相關規範。"},
{c:6,q:"物質濫用教育屬於Feature M11：物質使用服務的一部分。此項規定要求培訓內容涵蓋個人物質使用管理、處方鴉片類藥物教育，以及下列何者？",o:["如何回報同事的物質濫用情形","應向誰通報物質濫用疑慮","如何適當回應正面臨物質濫用問題的同事","如何回應酒精濫用"],a:2,e:"培訓內容須涵蓋如何適當回應正面臨物質濫用問題的同事。"},
{c:6,q:"酒精與藥物使用是全球疾病負擔的重要因素。依估計，全球身心障礙人口中約有多少比例與此相關？",o:["10%","18%","22%","32%"],a:3,e:"依Feature M11概述，全球約32%的身心障礙人口與酒精及藥物使用相關。"},
{c:6,q:"心理健康狀況在全球人口中相當普遍，一生中約有多少比例的成人會經歷心理健康狀況？",o:["30%","25%","53%","17%"],a:0,e:"依心理概念概述，全球約30%成人一生中會經歷某種心理健康狀況。"},
{c:6,q:"Feature M01：心理健康促進的核心目的為何？",o:["於賦予員工額外責任前先進行心理健康篩檢","提供支持並促進使用者健康的計畫、政策及資源","將已證實可預防心理健康問題的活動遊戲化","規定每2小時強制休息以最大化員工恢復"],a:1,e:"Feature M01目的在於提供支持並促進使用者心理健康的計畫、政策及資源。"},
{c:6,q:"聯合國永續發展目標（SDGs）正透過WELL Building Standard獲得推展。2030永續發展議程共包含多少項SDGs？",o:["10項","22項","17項","5項"],a:2,e:"2030永續發展議程共包含17項聯合國永續發展目標（SDGs）。"},
{c:6,q:"某大學正為其最大的建築進行認證，並致力完成Feature M01：心理健康促進的規定。此特徵須以何種驗證方法提交細節？",o:["專業敘述報告","技術文件","現場照片","政策及／或營運排程"],a:3,e:"Feature M01要求以政策及／或營運排程作為驗證方法提交相關細節。"},
/* ---- 08 建材 Materials ---- */
{c:7,q:"依Feature X01：材料限制Part 3「限制鉛」規定，供飲用水配送用的管路、配件及焊料，其添加鉛的容許限值為何？",o:["0 ppm；新安裝建材不得含有任何添加鉛","產品加權濕潤平均值0.25%","產品加權濕潤平均值0.05%","產品含鉛量不得超過重量的300 ppm"],a:1,e:"產品可接受的加權濕潤平均含鉛量為0.25%或以下，並須經第三方驗證或標示符合ANSI/NSF 372。"},
{c:7,q:"為符合Feature X01：材料限制Part 3「限制鉛」規定，所有新安裝的火災警報器、電錶、感測器、電驛、恆溫器及斷路開關的容許含鉛限值為何？",o:["0 ppm；新安裝建材不得含有任何添加鉛","產品加權濕潤平均值0.25%","產品加權濕潤平均值0.05%","產品含鉛量不得超過重量的100 ppm"],a:3,e:"火災警報器、電錶、感測器、電驛、恆溫器及斷路開關的含鉛量不得超過重量的100 ppm（0.1%）。"},
{c:7,q:"依Feature X01：材料限制Part 1「限制石綿」規定，聲學處理材料、接縫保護材料及天花板產品類別的容許石綿限值為何？",o:["0 ppm；不得含有添加石綿","所有產品類別加權濕潤平均值0.25%","所有產品類別加權濕潤平均值0.05%","產品類別依重量或面積計算不得超過1,000 ppm石綿"],a:3,e:"熱防護、聲學處理、護套、屋頂與外牆包覆、防火防煙材料、接縫保護、灰泥與石膏板、天花板及彈性地板等產品類別，依重量或面積計算不得超過1,000 ppm石綿。"},
{c:7,q:"為符合Feature X01：材料限制Part 2「限制汞」規定，新安裝的火災警報器、電錶、感測器、電驛、恆溫器及斷路開關的容許含汞限值為何？",o:["0 ppm；不得含有添加汞","產品含汞量不得超過重量的0.1%","所有產品類別加權濕潤平均值0.05%","所有產品類別加權濕潤平均值0.25%"],a:1,e:"新安裝的火災警報器、電錶、感測器、電驛、恆溫器及斷路開關產品，含汞量不得超過重量的0.1%（1000 ppm）。"},
{c:7,q:"某博物館翻新專案的專案經理須依Feature X02：室內有害物質管理管理石綿及鉛的暴露風險。若建築內存在，還須管理下列哪種有害物質？",o:["汞","PVC（聚氯乙烯）","PCB（多氯聯苯）","甲醛"],a:2,e:"Feature X02要求管理石綿、鉛及多氯聯苯（PCB）等曾廣泛使用但已證實有毒的建材暴露風險。"},
{c:7,q:"為符合Feature X02：室內有害物質管理Part 1「管理石綿危害」規定，須由合格檢驗人員進行調查，最低須提供下列何項發現？",o:["透過偏光顯微鏡（PLM）或穿透式電子顯微鏡（TEM）檢測確認石綿是否存在","列出潛在危害的物質安全資料表（MSDS）","汞與甲醛所在位置清單","當地市政府對石綿有限使用的建築許可豁免"],a:0,e:"調查最低須透過PLM或TEM檢測方法確認石綿是否存在。"},
{c:7,q:"為符合Feature X10：害蟲管理與農藥使用Part 1「管理害蟲」規定，基於整合式害蟲管理（IPM）原則的管理計畫須包含下列哪項要素？",o:["害蟲監測數據、害蟲事件、農藥施用、控制行動及緊急應對之紀錄","附有數據支持農藥施用的害蟲容忍門檻紀錄","供所有使用者查閱的害蟲管理流程圖","供所有使用者查閱的已識別害蟲清單"],a:0,e:"害蟲控制管理計畫須包含害蟲監測數據、害蟲事件、農藥施用、控制行動及緊急應對等紀錄。"},
{c:7,q:"依Feature X02：室內有害物質管理Part 3「管理多氯聯苯（PCB）危害」規定，若須擾動或移除疑似含PCB的填縫材料，分析須依循何種協定進行？",o:["經驗證的保證函","經驗證的技術文件","由州立法代表或特定美國EPA或ISO測試方法規定","由當地法規規定，若無當地法規則依適用之美國EPA或ISO測試方法"],a:3,e:"相關協定由當地法規規定，若無當地法規，則須依適用之美國EPA或ISO測試方法辦理。"},
{c:7,q:"依Feature X03：CCA與鉛管理Part 1「管理戶外CCA危害」規定，若建築外部結構建於CCA限制法規實施之前並發現CCA，專案團隊應如何處理以符合規定？",o:["提供經驗證的保證函，讓含CCA的木結構原地保留","依適用法規處置含CCA木材，不得焚燒或木片化處理","依美國環保署（EPA）規定更換所有含CCA的木結構","僅整治專案邊界內預期有人員出入區域的CCA材料"],a:1,e:"若發現CCA，專案團隊須依適用法規處置含CCA木材，且不得焚燒或進行木片化處理。"},
{c:7,q:"依Feature X03：CCA與鉛管理規定，在WELL v2認證專案中，下列何種情況「不」適用鉛評估？",o:["專案已考量熱島效應","專案無人工草皮","專案遊樂場設有回收輪胎製成的鬆散填充橡膠","專案既有遊樂場設備出現油漆剝落"],a:1,e:"若人工草皮纖維經測得總鉛濃度超過門檻，方須進行整治；若專案無人工草皮，則不適用此項鉛評估。"},
{c:7,q:"某專案已針對人工草皮纖維進行鉛負荷擦拭測試。依Feature X03：CCA與鉛管理Part 2規定，若鉛負荷達到多少μg/ft²即須進行整治？",o:["無須進行擦拭測試","擦拭測試結果顯示鉛負荷超過40 μg/ft²，須更換為鉛濃度低於136 mg/kg的草皮","擦拭測試結果顯示鉛負荷超過140 μg/ft²，須更換為鉛濃度低於136 mg/kg的草皮","擦拭測試結果顯示鉛負荷超過80 μg/ft²，須更換為鉛濃度低於300 mg/kg的草皮"],a:1,e:"若擦拭測試結果顯示總鉛負荷超過40 μg/ft²，須更換為鉛濃度低於136 mg/lb的人工草皮。"},
{c:7,q:"某WELL專案正評估既有遊樂場設備上的油漆。若發現含鉛比例達多少ppm，須進行整治程序？",o:["30 ppm","60 ppm","90 ppm","120 ppm"],a:2,e:"依Feature X03：CCA與鉛管理Part 2規定，含鉛量達90 ppm即須進行整治。"},
{c:7,q:"鉛屬於既有的外部危害物質，須加以識別並整治。專案基地中，鉛可能存在於下列何處？",o:["辦公室內擺放的家具","商業廚房使用的地板材質","戶外結構及遊樂場所使用的油漆","整個專案使用的LED照明"],a:2,e:"鉛常見於較舊的戶外結構及遊樂場設備所使用的油漆之中。"},
{c:7,q:"新塗裝之膠著劑、密封膠、油漆及塗料須符合加州公共衛生部（CDPH）標準方法v1.2以管理產品排放，此規定屬於下列哪一項WELL特徵？",o:["Feature X06：VOC限制","Feature X02：室內有害物質管理","Feature X11：清潔產品與協定","Feature X01：材料限制"],a:0,e:"Feature X06：VOC限制要求新塗裝的膠著劑、密封膠、油漆及塗料須符合CDPH標準方法v1.2。"},
{c:7,q:"於Feature X06：VOC限制中，若專案於「依成本」及「依表面積」兩項產品類別皆完全合規，最多可取得幾分？",o:["0分","1分","2分","3分"],a:2,e:"若兩項產品類別皆完全合規，專案最多可取得2分。"},
{c:7,q:"下列哪些標準為Feature X06：VOC限制中規範家具VOC含量的依據？（CDPH、ANSI/BIFMA、SCAQMD、SMACNA）",o:["僅第3項","第1項及第2項","第1、3、4項","第2項及第3項"],a:1,e:"家具VOC含量限值依據CDPH及ANSI/BIFMA兩項標準訂定。"},
{c:7,q:"某財富500企業承租既有建築5個樓層，業務經理已核准為其中一層62名員工採購新辦公桌椅。依規定，這些新辦公桌椅至少須有多少比例（依成本計）符合ANSI/BIFMA e3-2014標準？",o:["10%","30%","50%","75%"],a:3,e:"依Feature X06：VOC限制Part 2規定，至少75%（依成本計）新家具須符合ANSI/BIFMA e3-2014標準。"},
{c:7,q:"室內環境中存在害蟲可能對人體健康產生負面影響。研究顯示農藥暴露會增加下列哪種兒童疾病的風險？",o:["兒童慢性阻塞性肺病","兒童疲勞","兒童氣喘","兒童癌症"],a:2,e:"依Feature X10概述，研究顯示農藥暴露與兒童氣喘風險增加有關。"},
{c:7,q:"整合式害蟲管理計畫（IPM）是限制建築內外農藥使用的一種方式。若專案內有進行任何農藥施用，須向使用者及業主提供下列何者？",o:["害蟲照片","農藥安全資料表（SDS）","害蟲相關數據表","害蟲學名"],a:1,e:"Feature X10要求任何農藥施用皆須提供對應的安全資料表（SDS）供查閱。"},
{c:7,q:"塑化劑（DEHP、DBP、BBP、DINP、DIDP、DNOP）於地板及壁材中被限制在0.01%（100 ppm）以下，此規定屬於下列哪一項特徵？",o:["Feature X08：材料優化","Feature X06：VOC限制","Feature X02：室內有害物質管理","Feature X05：加強材料限制"],a:3,e:"Feature X05：加強材料限制規範地板及壁材中塑化劑含量須低於0.01%（100 ppm）。"},
{c:7,q:"依Feature X05：加強材料限制Part 1「選用合規室內家具」規定，若至少50%（依成本計）新安裝家具、木作及固定裝置的鹵化阻燃劑含量低於多少，即可取得1分？",o:["10 ppm","100 ppm","1000 ppm","2000 ppm"],a:1,e:"至少50%（依成本計）新安裝家具、木作及固定裝置的鹵化阻燃劑含量須低於100 ppm，即可取得1分。"},
{c:7,q:"Feature X05：加強材料限制聚焦於鄰苯二甲酸酯、鹵化阻燃劑，以及下列何種物質的疑慮？",o:["全氟化合物（PFCs）","鉛","鉻化銅砷酸鹽","硝酸鹽"],a:0,e:"Feature X05同時聚焦於鄰苯二甲酸酯、鹵化阻燃劑及全氟化合物（PFCs）三類物質的疑慮。"},
{c:7,q:"Feature X05：加強材料限制Part 1也對電氣及電子產品訂定標準。新安裝的電氣及電子產品須符合下列何者？",o:["ASHRAE 55","SCAQMD Rule 1168","RoHS限制規範","從搖籃到搖籃（Cradle to Cradle）"],a:2,e:"新安裝的電氣及電子產品須符合RoHS限制規範。"},
{c:7,q:"下列哪一種於紡織品及塑膠材料中發現的化學物質，依Feature X05：加強材料限制規定，須限制在新安裝家具、木作及固定裝置中最高100 ppm？",o:["石綿","農藥","鹵化阻燃劑（HFR）","甲醛"],a:2,e:"鹵化阻燃劑（HFR）須限制於新安裝家具、木作及固定裝置的紡織品及塑膠材料中最高100 ppm。"},
{c:7,q:"下列何者「並非」符合Feature X07：材料透明度Part 3「選用具第三方驗證成分之產品」的可接受第三方驗證方式？",o:["Cradle to Cradle™材料健康證書","GreenScreen®基準","健康產品聲明書（HPD）","Declare Label（Living Building Challenge）"],a:1,e:"GreenScreen®基準並非Feature X07列出的可接受第三方驗證方式之一。"},
{c:7,q:"依Feature X05：加強材料限制Part 1規定，新安裝家具、木作及固定裝置中的紡織品與塑膠，其鹵化阻燃劑（HFR）含量上限為何？",o:["15 ppm","100 ppm","450 ppm","55 ppm"],a:1,e:"紡織品及塑膠材料中的鹵化阻燃劑（HFR）等化合物含量須為100 ppm（0.01%）或以下，除非當地法規另有更高要求。"},
{c:7,q:"依Feature X05：加強材料限制Part 1規定（最高1分），新安裝家具、內建家具、室內裝修及裝修材料至少須有多少比例（依成本計）合規，方能符合此規定？",o:["50%","25%","45%","55%"],a:0,e:"至少50%（依成本計）的新安裝產品須合規，方能取得此積分。"},
{c:7,q:"下列哪一項WELL特徵推廣使用經獨立驗證、不含多項疑慮危害物質的產品？",o:["Feature X05：加強材料預防措施","Feature X01：材料限制","Feature X03：CCA與鉛管理","Feature X12：接觸減量"],a:0,e:"Feature X05：加強材料限制推廣使用經獨立驗證、不含多項疑慮危害物質的產品。"},
{c:7,q:"某都市開發案剛完工，新租戶正陸續進駐。專案團隊正彙整所有產品以申報Feature X05：加強材料限制。專案團隊應採用下列何種指標申報合規性？",o:["重量或成本二擇一","重量","體積","成本"],a:3,e:"Feature X05規定應以「成本」作為申報合規性的計算指標。"},
{c:7,q:"Feature X11：清潔產品與協定要求專案制定並實施清潔計畫。此計畫須詳列下列何者？",o:["掃地的操作說明","清潔的範圍與頻率","各項清潔作業所需完成的時間","綠色清潔產品與一般清潔產品的區別"],a:1,e:"Feature X11要求清潔計畫須詳列清潔的範圍與頻率。"},
/* ---- 09 社區 Community ---- */
{c:8,q:"依Feature C02：整合式設計Part 1「舉辦利害關係人共識營」規定，利害關係人共識營應於何時舉辦？",o:["專案啟動後不久","持續進行（每月一次）","規劃過程的早期階段","專案完工後"],a:2,e:"利害關係人共識營須於規劃過程的早期階段舉辦，以利各方及早參與整合設計討論。"},
{c:8,q:"依Feature C02：整合式設計流程規定，於專案設計及規劃階段之前，須有哪些角色與利害關係人會面，才能達成WELL認證？",o:["工程師與業主","專案經理與業主","專案經理、業主、建築師","建築師、業主、設施管理團隊及工程師"],a:3,e:"須由建築師、業主、設施管理團隊及工程師等核心角色共同參與此整合式規劃流程。"},
{c:8,q:"Feature C02：整合式設計Part 2「推廣健康導向使命」規定，專案須建立健康導向使命。該使命應詳載於何處？",o:["給所有使用者的一般通知","WELL特徵指南（WELL Feature Guide）","專案檢核表","專案矩陣"],a:1,e:"健康導向使命須詳載於WELL特徵指南中，以利團隊及後續稽核參考。"},
{c:8,q:"WELL Building Standard的社區概念旨在建立具包容性、參與感的使用者社群。下列何者為連結社群成員的因素？",o:["社會連結","共同觀點","於共享場域中共同參與行動與經驗","以上皆是"],a:3,e:"社區概念概述指出，社會連結、共同觀點及共享場域中的共同參與皆是連結社群成員的重要因素。"},
{c:8,q:"健康的社會決定因素（Social Determinants of Health）包含下列何者？",o:["環境因素","生理與建成環境條件","心理因素","以上皆是"],a:1,e:"依社區概念概述，生理與建成環境條件是健康社會決定因素的重要組成部分。"},
{c:8,q:"依WELL社區概念，下列何者「並非」健康差異（health disparity）的分類因素？",o:["性別","種族","族裔","年齡"],a:3,e:"依社區概念概述，年齡並未被列為該概念所述的健康差異分類因素之一。"},
{c:8,q:"美國聯邦緊急事務管理署（FEMA）估計，由於缺乏完善的災難應變計畫及適當減災策略，約有多少比例的小型企業於災後永久歇業？",o:["75–80%","40–60%","20–30%","43–55%"],a:1,e:"依Feature C03：緊急應變準備概述，約40–60%小型企業因缺乏完善計畫而於災後永久歇業。"},
{c:8,q:"依Feature C04：使用者調查Part 1「選擇專案調查」規定，專案團隊應如何蒐集使用者的回饋意見？",o:["發給最大租戶的問卷","由IWBI認可之第三方廠商提供的調查","透過電子郵件發送的調查","意見箱"],a:1,e:"使用者調查須採用經IWBI認可之第三方廠商提供的調查工具進行。"},
{c:8,q:"依Feature C06：健康服務與福利Part 1「促進健康福利」規定，雇主可採取下列何種措施支持員工及其家庭的整體健康與福祉？",o:["提供彈性工時或遠距工作機會","為欲提升健康的員工購買健身追蹤器","提供全面性的健康福利、政策及服務","與公司團隊一同參加馬拉松"],a:2,e:"Feature C06要求提供全面性的健康福利、政策及服務，以支持使用者及其家庭的健康。"},
{c:8,q:"依Feature C05：加強使用者調查Part 2「運用啟用前後調查」規定，物業管理團隊於進行啟用後調查時須做到下列何者？",o:["使用第三方設計的調查","於建築內自行進行調查","確保受訪者非被強迫參與調查","比較啟用前調查與啟用後調查的結果"],a:3,e:"團隊須將啟用前調查結果與啟用後調查結果進行比較分析。"},
{c:8,q:"Feature C06：健康服務與福利概述指出，全球94%國家強制規定帶薪病假，美國與下列哪個國家是僅有的兩個未強制規定帶薪病假的OECD國家？",o:["日本","韓國","土耳其","智利"],a:1,e:"美國與韓國是OECD國家中僅有的兩個未強制規定帶薪病假的國家。"},
{c:8,q:"研究估計，因缺乏病假或僅有一天病假而帶病上班的美國人約有多少？",o:["100,000人","375,000人","10,000,000人","20,000,000人"],a:3,e:"研究估計約有2,000萬美國人因缺乏足夠病假而選擇帶病上班。"},
{c:8,q:"研究顯示，實施下列何者可降低職場傳染風險、提升員工生產力並降低員工流動率？",o:["雇主支付的遠距醫療服務","帶薪病假","開放式辦公空間設計","雇主每日提供的健康午餐"],a:1,e:"Feature C06：健康服務與福利指出，實施帶薪病假可降低職場傳染風險並帶來多項正面效益。"},
{c:8,q:"依Feature C07：加強健康與福祉促進，每投入1美元於下列何者，醫療成本及缺勤成本分別可下降約3.27美元及2.73美元？",o:["每季公司度假活動","職場健康計畫","辦公室茶水點心","公司提撥401(k)退休金"],a:1,e:"依Feature C07概述，每投入1美元於職場健康計畫，可帶來醫療成本下降3.27美元、缺勤成本下降2.73美元的效益。"},
{c:8,q:"為取得Feature C06：健康服務與福利Part 2「提供隨需健康服務」的1分，WELL認證建築須提供下列何者？",o:["餐廳主廚","駐點醫師或執業護理師","首席健康官","體適能教練"],a:1,e:"取得此積分須提供駐點醫師或執業護理師等隨需健康服務。"},
{c:8,q:"Feature C08：新手父母支持Part 1「提供新手父母休假」規定，帶薪休假須達員工全額薪資或工資的多少比例以上，並涵蓋相關福利？",o:["50%","70%","75%","100%"],a:2,e:"帶薪休假須達員工全額薪資或工資的75%以上，並持續涵蓋相關福利。"},
{c:8,q:"WELL Feature C08：新手父母支持最低促進主要照顧者及非主要照顧者可獲得多少帶薪休假？",o:["主要照顧者至少2週｜非主要照顧者5天","主要照顧者至少4週｜非主要照顧者至少2週","主要照顧者至少12週｜非主要照顧者2週","主要照顧者至少30週｜非主要照顧者4週"],a:2,e:"依規定，主要照顧者最低須有12週帶薪休假，非主要照顧者最低須有2週。"},
{c:8,q:"育兒支持政策以多種方式協助員工及其家庭。下列何者「並非」符合WELL規定的可實施政策？",o:["提供教練計畫、諮商或其他資源協助員工休假後復職過渡","使用虛擬助理協助分擔工作量","為主管提供培訓，協助規劃休假及員工復職後的最佳支持方式","向準父母溝通專案或組織的育兒休假政策及支持資源"],a:1,e:"使用虛擬助理分擔工作量並非Feature C08概述所列的政策項目之一。"},
{c:8,q:"依Feature C09：新手母親支持Part 1「提供職場哺乳支持」規定，合格員工每8小時工作日應安排多少次擠乳時段？",o:["1–2次","2–3次","5–7次","4–8次"],a:1,e:"每8小時工作日應安排2–3次擠乳時段，每次至少15–20分鐘，並依個別需求調整。"},
{c:8,q:"一位哺乳期母親須出差拜訪客戶，行程約1天半（36小時）。依Feature C09：新手母親支持Part 1規定，應提供何種差旅安排？",o:["附冰箱設施的飯店房間或其他住宿安排","由員工自行購買的保冷袋","支付將母乳快遞寄回家的費用","將回程班機改為較早時段"],a:0,e:"應提供附冰箱設施的住宿安排，以利哺乳期員工儲存母乳。"},
{c:8,q:"Feature C10：家庭支持旨在支持在職父母及照顧者妥善照顧家庭成員。若專案無現場托兒中心，應為員工補助多少比例的場外或居家托兒費用？",o:["10%","25%","50%","75%"],a:2,e:"若無現場托兒中心，須補助至少50%的場外或居家托兒費用。"},
{c:8,q:"依Feature C10：家庭支持規定，下列何者「不包含」於托兒支持項目中？",o:["現場托兒中心，或補助至少50%場外／居家托兒費用","為常態使用者提供備援托兒服務，免費或補助至少50%","為有學齡兒童的常態使用者提供季節性托兒計畫","員工可於孩子生病時攜帶孩子至辦公室"],a:3,e:"允許員工於孩子生病時攜帶孩子至辦公室，並非Feature C10所列的托兒支持措施。"},
{c:8,q:"某員工須請假照顧被診斷罹癌的配偶。依規定，該員工至少應獲得多少帶薪假？",o:["2週帶薪假，薪資支付比例達50%以上","4週帶薪假，薪資支付比例達70%以上","12週帶薪假，薪資支付比例達75%以上","16週帶薪假，薪資支付比例達75%以上"],a:2,e:"依Feature C10：家庭支持Part 2規定，最低須提供12週、支付比例達75%以上的帶薪假。"},
{c:8,q:"當員工照顧罹患末期疾病的配偶並達12週、支付75%薪資的休假門檻後，除下列何者外，其餘皆為員工可選擇的選項？",o:["被迫返回工作崗位或離職","使用帶薪病假或個人假照顧配偶","每日提早到班或提早下班","永久居家辦公"],a:0,e:"強迫員工返回工作崗位或離職並非Feature C10所允許的選項，員工應有其他彈性安排可供選擇。"},
{c:8,q:"Acme公司對其所在社區懷抱熱忱，每年舉辦多項回饋活動。下列何者屬於WELL規定中的公民參與（Civic Engagement）範例？",o:["每年舉辦支持慈善機構的5公里路跑及野餐活動","提供捐款配對，讓員工選擇支持的慈善組織","萬聖節服裝比賽","三月瘋狂賽事對賭獎金池"],a:1,e:"捐款配對活動屬於Feature C11：公民參與所認可的社區參與形式之一。"},
{c:8,q:"Acme公司正於喬治亞州亞特蘭大興建新辦公室。為取得Feature C11：公民參與的積分，須提供供社區使用的室內或戶外空間。下列哪種空間類型最適合此積分？",o:["面積2,000平方英尺的董事會會議室","可容納5位成人的小型會議室","附有足夠桌椅、可容納10–20位成人的戶外教室／廣場","每兩週開放一次的簡報廳"],a:2,e:"可容納10–20位成人、具備適當設施的戶外教室／廣場，最適合用於社區使用。"},
{c:8,q:"某專案欲提交一項計畫，以符合Feature C12：多元與包容規定。下列何者「除外」，其餘皆須納入該計畫？",o:["多元、包容及／或反歧視政策","薪酬公平與透明","廢除高階管理層並成立公司合作社的協定","反歧視，包括歧視與騷擾申訴程序"],a:2,e:"廢除高階管理層並成立公司合作社並非Feature C12要求納入計畫的項目之一。"},
{c:8,q:"某專案希望透過自訂計畫最大化其多元與包容積分。若欲取得最高3分，須自清單中實施多少項規定？",o:["3項","4項","5項","7項"],a:2,e:"依Feature C12：多元與包容規定，須自清單中實施至少5項，方可取得最高3分。"},
{c:8,q:"XYZ公司要求一名資深員工從亞特蘭大調往洛杉磯，公司支付搬遷費用並加薪1,000美元。該員工將與西岸的家人同住。XYZ公司是否符合Feature C12：多元與包容的相關標準？",o:["是，因為XYZ已支付搬遷費用且員工感到滿意","否，因為XYZ須依當地生活成本提供生活工資調整","是，因為員工將與家人同住，不會產生額外生活成本","否，因為XYZ須提供績效加薪、晉升加薪及簽約獎金"],a:1,e:"Feature C12要求企業於員工異地調動時，須依當地生活成本提供適當的生活工資調整。"},
{c:8,q:"某公司新總部設計團隊將辦公室設計得獨特、富創意且色彩鮮明大膽，部分員工反映鮮豔配色令人分心並造成感官過載。在此設計語言確定前，應參考Feature C13：無障礙與通用設計中的哪一項策略？",o:["Section A（實體無障礙）","Section B（發展與智能健康）","Section C（尋路）","Section D（營運）"],a:1,e:"Section B聚焦於發展與智能健康相關考量，涵蓋感官敏感度等議題，應於設計初期納入考量。"},
/* ---- 10 光環境 Light ---- */
{c:9,q:"WELL Building Standard中的光環境概念，主要目的是透過建築設計及照明系統，促進使用者何種節律的健康？",o:["消化節律","晝夜節律（Circadian Rhythm）","代謝節律","呼吸節律"],a:1,e:"光環境概念旨在透過適當的光照策略支持人體的晝夜節律，改善睡眠品質與整體健康。"},
{c:9,q:"人體的晝夜節律主要受下列何種外在因素影響最大？",o:["光照的時間、強度與波長","溫度變化","聲音環境","濕度變化"],a:0,e:"光照的時間、強度與波長是調節人體晝夜節律最主要的外在因素。"},
{c:9,q:"依Feature L01：光照對晝夜節律的影響（Light for Circadian Health）規定，專案須於一天中特定時段提供達到一定等效褪黑激素照度（EML）的光照。此規定主要目的為何？",o:["節省能源","抑制夜間褪黑激素分泌以維持清醒與警覺","增加空間亮度以利閱讀","降低眩光"],a:1,e:"此規定要求於白天特定時段提供足夠EML水準的光照，以抑制褪黑激素分泌並維持日間警覺度。"},
{c:9,q:"下列何者是評估光照對人體晝夜節律影響時，常用的量測單位？",o:["流明（Lumens）","勒克斯（Lux）","等效褪黑激素照度（EML, Equivalent Melanopic Lux）","坎德拉（Candela）"],a:2,e:"EML是專門用於評估光照對褪黑激素抑制及晝夜節律影響的量測單位。"},
{c:9,q:"依Feature L02：視覺照明設計（Visual Lighting Design）規定，辦公空間的一般照明應達到何種最低維持照度水準，以支持視覺作業表現？",o:["50 lux","150 lux","300 lux（依空間及作業類型而定）","1000 lux"],a:2,e:"依空間功能及作業類型不同，一般辦公照明建議維持約300 lux或依IES建議標準設定的照度水準。"},
{c:9,q:"下列何者是Feature L03：眩光控制（Glare Control）規定中，用以降低直接眩光及反射眩光的常見策略？",o:["增加室內窗戶數量","使用高亮度光源直射工作面","採用適當遮光角、間接照明或擴散罩等設計","降低天花板高度"],a:2,e:"適當遮光角設計、間接照明及擴散罩等策略，皆可有效降低直接與反射眩光，提升視覺舒適度。"},
{c:9,q:"下列何者屬於Feature L04：晝光設計策略（Daylight Design Strategies）中，用以增加自然採光深度的建築設計手法？",o:["導光板（Light Shelf）","降低窗戶面積","使用深色不透光窗簾","縮小開窗高度"],a:0,e:"導光板可將自然光反射至室內較深處，增加日光穿透深度，減少對人工照明的依賴。"},
{c:9,q:"依WELL規定，建築物中哪個區域最需要優先確保能獲得充足的自然採光及室外景觀？",o:["地下停車場","電梯機房","使用者長時間停留的常態使用空間（如辦公區、教室）","儲藏室"],a:2,e:"使用者長時間停留的常態使用空間應優先確保充足自然採光及景觀視野，以提升健康與福祉。"},
{c:9,q:"下列何者是評估建築物自然採光表現時常用的量化指標？",o:["空氣變換率（ACH）","混響時間","總揮發性有機物（TVOC）濃度","空間日光自主性（Spatial Daylight Autonomy, sDA）"],a:3,e:"空間日光自主性（sDA）是評估室內空間全年獲得充足自然採光比例的常用量化指標。"},
{c:9,q:"依日光模擬或現場量測相關規定，專案可透過下列何種方式證明其日光表現符合標準？",o:["電腦模擬分析或現場實測日光水準","僅提供建築外觀照片","僅提供窗戶尺寸清單","僅提供玻璃廠商型錄"],a:0,e:"專案可選擇透過電腦模擬分析（如sDA計算）或現場實地量測，證明其日光表現符合WELL規定水準。"},
{c:9,q:"下列何者是用以降低過度日光眩光及太陽熱增益，同時仍保留自然採光效益的常見遮陽策略？",o:["完全封閉所有窗戶","外遮陽板、電動窗簾或低透光玻璃塗層","移除所有窗戶","僅使用深色油漆"],a:1,e:"外遮陽板、電動窗簾及低透光玻璃塗層等策略，可在保留自然採光的同時，有效控制眩光與熱增益。"},
{c:9,q:"依低眩光工作站設計相關規定，電腦螢幕的擺放方向應避免與下列何者直接相對，以減少反射眩光？",o:["窗戶或強烈光源","牆壁","地板","天花板"],a:0,e:"螢幕應避免正對窗戶或強烈光源擺放，以減少螢幕表面產生反射眩光，影響視覺舒適度。"},
{c:9,q:"下列何者屬於照明品質規定中，用以評估光源顯色能力的指標？",o:["僅CCT","色溫（Correlated Color Temperature, CCT）","演色性指數（Color Rendering Index, CRI）與CCT皆是","僅風扇轉速"],a:2,e:"CRI用以評估光源還原物體真實色彩的能力，CCT則描述光源的色溫，兩者皆為照明品質規定中重要的評估指標。"},
{c:9,q:"一般而言，用於支持日間警覺度的照明色溫，相較於用於營造放鬆氛圍的照明，通常應設定為？",o:["較低色溫（偏暖黃光）","較高色溫（偏冷白光／藍光）","色溫與警覺度無關","兩者色溫應完全相同"],a:1,e:"較高色溫（偏冷白光）的光源含較多藍光成分，有助於提升日間警覺度並抑制褪黑激素分泌。"},
{c:9,q:"依晝夜節律照明設計相關規定，可調色溫調光（Tunable White）照明系統的主要功能為何？",o:["僅能調整亮度，不能調整色溫","可依時段自動調整色溫與照度，模擬自然光變化以支持晝夜節律","僅用於節省能源","僅適用於戶外照明"],a:1,e:"可調色溫調光系統能依一天中不同時段自動調整光色與照度，模擬自然光的變化，藉此支持使用者的晝夜節律。"},
{c:9,q:"下列何者「不是」WELL光環境概念中，用以評估或改善室內照明環境健康效益的常見策略？",o:["提升自然採光比例","導入可調色溫照明系統","刻意降低夜間照度以符合晝夜節律","刻意提高夜間辦公照度以延長工時"],a:3,e:"刻意提高夜間照度以延長工時，違背WELL光環境概念支持健康晝夜節律的核心精神，並非其推薦策略。"},
{c:9,q:"依戶外燈光污染控制相關規定，建築物外部照明設計應優先考量下列何者，以降低對周邊環境及夜間生態的影響？",o:["盡可能提高亮度以利辨識","採用具遮光罩、方向性佳的燈具並限制照明時段","使用高強度探照燈","全夜持續開啟所有外部照明"],a:1,e:"採用具遮光罩、方向性良好的燈具，並適當限制外部照明的開啟時段，可有效降低光害對周邊環境與夜間生態的影響。"},
{c:9,q:"下列何者是評估辦公空間是否具備良好室外景觀連結（View to Outdoors）的常見考量因素？",o:["僅考量窗戶總面積","使用者座位與窗戶的距離及視野品質","僅考量窗戶清潔頻率","僅考量窗框顏色"],a:1,e:"使用者座位與窗戶的距離及視野品質（如景觀內容、遮蔽物多寡），是評估室外景觀連結品質的重要考量因素。"},
{c:9,q:"依WELL規定，長時間處於缺乏自然光及室外景觀的室內環境，可能對使用者健康造成下列何種負面影響？",o:["提升工作效率","改善睡眠品質","可能導致情緒低落、疲勞及晝夜節律紊亂","增強免疫力"],a:2,e:"長期缺乏自然光及室外景觀，可能導致情緒低落、疲勞感增加及晝夜節律紊亂等負面健康影響。"},
{c:9,q:"下列何者屬於照明彈性控制規定中，賦予使用者對照明環境的自主控制能力？",o:["使用者可自行調整個人工作區域的照明亮度或色溫","僅由設施管理團隊統一控制全部照明","照明系統設定後不可再更動","僅允許管理階層調整照明"],a:0,e:"提供使用者自行調整個人工作區域照明亮度或色溫的能力，是照明彈性控制規定的核心精神，有助於滿足個別化需求。"},
{c:9,q:"下列何種空間類型，依WELL光環境概念規定，通常需要較高的照度水準以支持精細視覺作業？",o:["精密組裝或閱讀等精細作業空間","休息室","走廊","儲藏室"],a:0,e:"精密組裝、閱讀等需要高度視覺辨識精細度的作業空間，通常需要較高的照度水準以確保作業安全與效率。"},
{c:9,q:"依WELL規定，用以評估自然光穿透室內深度是否充足的常見建築設計參數為何？",o:["窗戶顏色","窗台高度與天花板高度之比等空間配置參數","地板材質","天花板顏色"],a:1,e:"窗台高度與天花板高度之比等空間配置參數，會直接影響自然光能穿透室內的深度，是設計階段重要的考量因素。"},

{c:9,q:"總結而言，WELL光環境概念的核心目標，是透過整合自然採光策略、人工照明設計及晝夜節律照明技術，達成下列何種效益？",o:["僅為降低能源成本","同時支持視覺舒適、作業表現與人體晝夜節律健康，提升整體福祉","僅為符合法規最低要求","僅為美化建築外觀"],a:1,e:"WELL光環境概念的核心目標，是透過整合性的光照策略，同時支持使用者的視覺舒適度、作業表現及晝夜節律健康，全面提升整體福祉。"},

/* ===================== 徽章設定 ===================== */
const BADGES_META = [
 ...CONCEPTS.map((c,i)=>({id:'concept'+i,name:c.name.split(' ')[0]+'達人',icon:c.icon,desc:'通關「'+c.name.split(' ')[0]+'」全部3關'})),
 {id:'m5',name:'初心者',icon:'🌱',desc:'累計通關5關'},
 {id:'m15',name:'半程英雄',icon:'⚡',desc:'累計通關15關'},
 {id:'m30',name:'WELL AP 大師',icon:'👑',desc:'通關全部30關'},
 {id:'star1',name:'神準直覺',icon:'🎯',desc:'首次一次就以3星過關'},
 {id:'star10',name:'穩定王者',icon:'🛡️',desc:'累計10關獲得3星'},
 {id:'starall',name:'全知全能',icon:'🌟',desc:'全部30關皆獲得3星'}
];

/* ===================== 本機儲存 ===================== */
const STORE_KEY='wellapGameProfiles_v1';
const LAST_KEY='wellapGameLastNick_v1';
function loadAll(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||{};}catch(e){return {};}}
function saveAll(all){localStorage.setItem(STORE_KEY,JSON.stringify(all));}
function getProfile(nick){
  const all=loadAll();
  if(!all[nick]){ all[nick]={cleared:{}, badges:{}}; saveAll(all); }
  return all[nick];
}
function saveProfile(nick,profile){ const all=loadAll(); all[nick]=profile; saveAll(all); }
function listNicks(){ return Object.keys(loadAll()); }

/* ===================== 遊戲狀態 ===================== */
let CURRENT_NICK=null;
let CURRENT_PROFILE=null;
let sessionAttempts={};
let quizState=null;

function totalLevels(){ return CONCEPTS.length*3; }
function levelQuestions(levelIdx){
  const c=Math.floor(levelIdx/3), sub=levelIdx%3, start=sub*10;
  return QUESTIONS.filter(q=>q.c===c).slice(start,start+10);
}
function isUnlocked(levelIdx){ return true; /* 已開放自由跳關，所有關卡皆可任選挑戰 */ }

/* ===================== 登入畫面 ===================== */
function renderLogin(){
  const nicks=listNicks();
  const last=localStorage.getItem(LAST_KEY)||'';
  document.getElementById('app').innerHTML=
   '<div class="center"><div class="card" style="max-width:440px;">'
   +'<div style="font-size:44px;">🏆</div>'
   +'<h2>WELL AP 300題闖關測驗</h2>'
   +'<p class="muted">輸入暱稱，開始或繼續你的闖關進度（每個暱稱各自保存進度）</p>'
   +'<input id="nickInput" class="nick" placeholder="輸入暱稱" value="'+last.replace(/"/g,'&quot;')+'"/>'
   +'<div style="margin-top:14px;"><button class="btn btn-primary" onclick="startLogin()">開始 / 繼續闖關</button></div>'
   +(nicks.length? '<div class="quick-nick">'+nicks.map(function(n){return '<button onclick="quickLogin(\''+n.replace(/'/g,"\\'")+'\')">'+n+'</button>';}).join('')+'</div>':'')
   +'</div></div>';
}
function startLogin(){
  const v=document.getElementById('nickInput').value.trim();
  if(!v){ toast('請輸入暱稱'); return; }
  loginAs(v);
}
function quickLogin(n){ loginAs(n); }
function loginAs(nick){
  CURRENT_NICK=nick;
  CURRENT_PROFILE=getProfile(nick);
  localStorage.setItem(LAST_KEY,nick);
  renderMap();
}
function logout(){ CURRENT_NICK=null; CURRENT_PROFILE=null; renderLogin(); }

/* ===================== 關卡地圖 ===================== */
function countStars(){ return Object.values(CURRENT_PROFILE.cleared).reduce(function(a,b){return a+b;},0); }
function countClearedLevels(){ return Object.keys(CURRENT_PROFILE.cleared).length; }
function countBadges(){ return Object.keys(CURRENT_PROFILE.badges).length; }

function renderMap(){
  let html='<div class="topbar">'
   +'<div class="who">👋 '+CURRENT_NICK+'</div>'
   +'<div style="display:flex;gap:8px;flex-wrap:wrap;">'
   +'<div class="pill">⭐ '+countStars()+'/'+(totalLevels()*3)+'</div>'
   +'<div class="pill">✅ '+countClearedLevels()+'/'+totalLevels()+'關</div>'
   +'<div class="pill" style="cursor:pointer" onclick="openBadges()">🏅 '+countBadges()+'/'+BADGES_META.length+'</div>'
   +'<button class="btn btn-ghost" onclick="logout()">切換玩家</button>'
   +'</div></div>';
  CONCEPTS.forEach(function(c,ci){
    html+='<div class="section"><div class="section-head"><div class="dot" style="background:'+c.color+'">'+c.icon+'</div><div style="font-weight:800;font-size:18px;">'+c.name+'</div></div><div class="levels-row">';
    for(let s=0;s<3;s++){
      const levelIdx=ci*3+s;
      const unlocked=isUnlocked(levelIdx);
      const stars=CURRENT_PROFILE.cleared[levelIdx]||0;
      const cleared=!!CURRENT_PROFILE.cleared[levelIdx];
      html+='<div class="level-node '+(unlocked?'':'locked')+'" style="'+(unlocked?('background:'+c.color):'')+'" onclick="'+(unlocked?('enterLevel('+levelIdx+')'):'')+'">'
       +'<div class="lv">'+(unlocked?(cleared?'✓':'▶'):'🔒')+'</div>'
       +'<div class="num">第'+(levelIdx+1)+'關</div>'
       +'<div class="stars">'+(cleared? '⭐'.repeat(stars)+'☆'.repeat(3-stars) : '')+'</div>'
       +'</div>';
    }
    html+='</div></div>';
  });
  document.getElementById('app').innerHTML=html;
}

/* ===================== 徽章牆 ===================== */
function openBadges(){
  let html='<div class="modal-bg" onclick="if(event.target===this) closeModal()"><div class="modal"><h3>🏅 徽章牆</h3><div class="badges-grid">';
  BADGES_META.forEach(function(b){
    const got=!!CURRENT_PROFILE.badges[b.id];
    html+='<div class="badge '+(got?'':'locked')+'"><div class="ic">'+b.icon+'</div><div class="nm">'+b.name+'</div><div class="ds">'+b.desc+'</div></div>';
  });
  html+='</div><div class="footer-actions"><button class="btn btn-outline" onclick="closeModal()">關閉</button></div></div></div>';
  const d=document.createElement('div'); d.id='modalRoot'; d.innerHTML=html;
  document.body.appendChild(d);
}
function closeModal(){ const d=document.getElementById('modalRoot'); if(d) d.remove(); }

/* ===================== 測驗流程 ===================== */
function enterLevel(levelIdx){
  sessionAttempts[levelIdx]=(sessionAttempts[levelIdx]||0)+1;
  const qs=levelQuestions(levelIdx);
  quizState={levelIdx:levelIdx, qs:qs, qIdx:0, answers:new Array(qs.length).fill(null)};
  renderQuestion();
}
function renderQuestion(){
  const qs=quizState.qs, qIdx=quizState.qIdx, answers=quizState.answers;
  const q=qs[qIdx];
  const revealed=answers[qIdx]!==null;
  const c=CONCEPTS[Math.floor(quizState.levelIdx/3)];
  let progHtml='';
  for(let i=0;i<qs.length;i++){ progHtml+='<span class="'+(i<qIdx?'done':(i===qIdx?'now':''))+'"></span>'; }
  let optsHtml='';
  q.o.forEach(function(opt,i){
    let cls='opt';
    let onclick=' onclick="selectAnswer('+i+')"';
    if(revealed){
      onclick='';
      if(i===q.a) cls+=' correct-opt';
      else if(i===answers[qIdx]) cls+=' wrong-opt';
      else cls+=' disabled-opt';
    }
    optsHtml+='<button class="'+cls+'"'+onclick+'>'+String.fromCharCode(65+i)+'. '+opt+(revealed&&i===q.a?' ✓':'')+(revealed&&i===answers[qIdx]&&i!==q.a?' ✗':'')+'</button>';
  });
  let feedbackHtml='';
  if(revealed){
    const ok=answers[qIdx]===q.a;
    feedbackHtml='<div class="fb-banner '+(ok?'ok':'no')+'">'+(ok?'✅ 答對了！':'❌ 答錯了，正確答案是 '+String.fromCharCode(65+q.a))+'</div>'
     +'<div class="explain">💡 解析：'+q.e+'</div>';
  }
  document.getElementById('app').innerHTML=
   '<div class="topbar"><div class="who">'+c.icon+' '+c.name+' · 第'+(quizState.levelIdx+1)+'關</div><button class="btn btn-ghost" onclick="if(confirm(\'確定要離開本關嗎？本次進度不會被記錄\')) renderMap()">離開本關</button></div>'
   +'<div class="qcard"><div class="qprog">'+progHtml+'</div>'
   +'<div class="muted" style="margin-bottom:6px;">第 '+(qIdx+1)+' / '+qs.length+' 題</div>'
   +'<div class="qtext">'+q.q+'</div>'
   +optsHtml
   +feedbackHtml
   +(revealed?'<div class="footer-actions"><button class="btn btn-primary" onclick="nextQuestion()">'+(qIdx===qs.length-1?'完成本關':'下一題')+'</button></div>':'')
   +'</div>';
}
function selectAnswer(i){
  if(quizState.answers[quizState.qIdx]!==null) return;
  quizState.answers[quizState.qIdx]=i;
  renderQuestion();
}
function nextQuestion(){
  if(quizState.answers[quizState.qIdx]===null){ toast('請先選擇一個答案'); return; }
  if(quizState.qIdx<quizState.qs.length-1){ quizState.qIdx++; renderQuestion(); }
  else finishLevel();
}
function finishLevel(){
  const qs=quizState.qs, answers=quizState.answers, levelIdx=quizState.levelIdx;
  let score=0;
  qs.forEach(function(q,i){ if(answers[i]===q.a) score++; });
  const passed = score===qs.length;
  let stars=0;
  if(passed){
    const attempts=sessionAttempts[levelIdx]||1;
    stars = attempts>=3?1:(attempts===2?2:3);
    const prevStars=CURRENT_PROFILE.cleared[levelIdx]||0;
    CURRENT_PROFILE.cleared[levelIdx]=Math.max(prevStars,stars);
    checkBadges();
    saveProfile(CURRENT_NICK,CURRENT_PROFILE);
  }
  renderResult(score,qs.length,passed,stars,qs,answers,levelIdx);
}
function checkBadges(){
  CONCEPTS.forEach(function(c,ci){
    const allCleared=[0,1,2].every(function(s){return !!CURRENT_PROFILE.cleared[ci*3+s];});
    if(allCleared) CURRENT_PROFILE.badges['concept'+ci]=true;
  });
  const clearedCount=Object.keys(CURRENT_PROFILE.cleared).length;
  if(clearedCount>=5) CURRENT_PROFILE.badges['m5']=true;
  if(clearedCount>=15) CURRENT_PROFILE.badges['m15']=true;
  if(clearedCount>=totalLevels()) CURRENT_PROFILE.badges['m30']=true;
  const threeStarCount=Object.values(CURRENT_PROFILE.cleared).filter(function(s){return s===3;}).length;
  if(threeStarCount>=1) CURRENT_PROFILE.badges['star1']=true;
  if(threeStarCount>=10) CURRENT_PROFILE.badges['star10']=true;
  if(threeStarCount>=totalLevels()) CURRENT_PROFILE.badges['starall']=true;
}
function renderResult(score,total,passed,stars,qs,answers,levelIdx){
  let confettiHtml='';
  if(passed){
    let pieces='';
    const colors=['#ffb703','#fb8500','#8ecae6','#219ebc','#ef476f','#06d6a0'];
    for(let i=0;i<44;i++){
      const left=(Math.random()*100).toFixed(1);
      const dur=(2+Math.random()*2).toFixed(2);
      const delay=(Math.random()*0.6).toFixed(2);
      const bg=colors[i%colors.length];
      pieces+='<i style="left:'+left+'%;background:'+bg+';animation-duration:'+dur+'s;animation-delay:'+delay+'s;"></i>';
    }
    confettiHtml='<div class="confetti">'+pieces+'</div>';
  }
  let reviewHtml='';
  qs.forEach(function(q,i){
    const ok=answers[i]===q.a;
    const yourAns= answers[i]===null? '（未作答）' : (String.fromCharCode(65+answers[i])+'. '+q.o[answers[i]]);
    reviewHtml+='<div class="review '+(ok?'ok':'no')+'">'
     +'<span class="tag">'+(ok?'答對':'答錯')+'</span>'
     +'<div style="font-weight:700;">'+(i+1)+'. '+q.q+'</div>'
     +'<div style="margin-top:6px;">你的答案：'+yourAns+'</div>'
     +'<div>正確答案：'+String.fromCharCode(65+q.a)+'. '+q.o[q.a]+'</div>'
     +'<div class="explain">💡 解析：'+q.e+'</div>'
     +'</div>';
  });
  document.getElementById('app').innerHTML=
   confettiHtml
   +'<div class="center"><div class="card" style="max-width:660px;width:100%;">'
   +'<div style="font-size:46px;">'+(passed?'🎉':'💪')+'</div>'
   +'<div class="scoretxt">'+score+' / '+total+'</div>'
   +(passed? ('<div class="bigstars">'+'⭐'.repeat(stars)+'☆'.repeat(3-stars)+'</div><div style="font-weight:800;color:#16a34a;">恭喜通關！</div>')
            : '<div style="font-weight:800;color:#dc2626;margin-top:10px;">尚未全對，再挑戰一次！</div>')
   +'<div style="max-height:360px;overflow:auto;text-align:left;margin-top:16px;">'+reviewHtml+'</div>'
   +'<div class="footer-actions">'
   +(passed? '<button class="btn btn-primary" onclick="renderMap()">返回關卡地圖</button>'
           : ('<button class="btn btn-primary" onclick="enterLevel('+levelIdx+')">重新挑戰本關</button><button class="btn btn-outline" onclick="renderMap()">返回關卡地圖</button>'))
   +'</div></div></div>';
}

/* ===================== 提示訊息 ===================== */
function toast(msg){
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); },2400);
}

/* ===================== 啟動 ===================== */
renderLogin();
</script>
</body>
</html>
